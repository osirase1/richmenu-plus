<script id="htmlSingleFinalStableScript">
(function(){
  'use strict';
  const SAVE_CARD_ID='canvasSaveOperationCard';
  const FIXED_ZOOM=0.32;
  const $=id=>document.getElementById(id);
  const qs=sel=>document.querySelector(sel);
  const qsa=sel=>Array.from(document.querySelectorAll(sel));

  function ensureLineUiText(){
    const linePane=qs('.right-tab-pane[data-tab-pane="line"]');
    const lineBtn=qs('.right-tab-btn[data-tab-key="line"]');
    if(lineBtn)lineBtn.textContent='保存管理';
    const lineTitle=qs('.right-tab-pane[data-tab-pane="line"] > h3');
    if(lineTitle)lineTitle.textContent='保存管理';
    const apiBtn=$('btnApiUpload');
    if(apiBtn){
      apiBtn.textContent='💾 お手軽保存';
      apiBtn.style.width='100%';
      apiBtn.classList.remove('header-line-action','right-primary-action','btn-primary','api-main-action');
      apiBtn.classList.add('save-primary-action');
    }
    if(linePane && apiBtn){
      const row=$('saveQuickActionRow');
      if(row && apiBtn.parentElement!==row)row.appendChild(apiBtn);
      const backupBtn=$('btnBackupProjectSave');
      if(row && backupBtn){
        backupBtn.classList.remove('right-primary-action','btn-primary');
        backupBtn.classList.add('backup-save-action');
        backupBtn.style.width='100%';
        if(backupBtn.parentElement!==row)row.appendChild(backupBtn);
      }
    }
    const mini=qs('.line-mini-note');
    if(mini){mini.style.whiteSpace='pre-line';mini.textContent='LINEに反映を押した後に確認されたい場合は、LINEアプリを落としてください。\nまれに、反映されるのに、数分お時間がかかる時があります。\nそれでも反映されない時は、LINE表示を停止を押し、リッチメニューが消えてるかを確認後、再度LINEに反映を押してください。';}
    const apiTitle=qs('#panel-api > h3');
    if(apiTitle)apiTitle.remove();
  }

  function normalizeClientNameForProject(name){
    return String(name||'').trim();
  }

  function createOrSelectClientForNewProject(name){
    const cleanName=normalizeClientNameForProject(name);
    if(!cleanName){
      currentClientId='';
      if(typeof renderClientSelect==='function')renderClientSelect();
      return null;
    }
    const clients=typeof getSavedClients==='function'?getSavedClients():[];
    let client=clients.find(c=>c && String(c.name||'').trim()===cleanName);
    if(!client){
      client={id:uid('client'),name:cleanName,channelAccessToken:''};
      clients.push(client);
      if(typeof setSavedClients==='function')setSavedClients(clients);
    }
    currentClientId=client.id;
    if(typeof renderClientSelect==='function')renderClientSelect();
    const select=$('clientSelect');
    if(select)select.value=currentClientId||'';
    const clientNameInput=$('clientNameInput');
    if(clientNameInput)clientNameInput.value=cleanName;
    return client;
  }

  function createNewProjectFromRightMenu(){
    const clientInput=$('clientProjectNameInput');
    const defaultClientName=normalizeClientNameForProject(clientInput&&clientInput.value);
    const enteredName=prompt('新しく作成するクライアント名を入力してください。\n空欄のままでも新規作成できます。',defaultClientName);
    if(enteredName===null)return;
    const newClientName=normalizeClientNameForProject(enteredName);
    const hasWork=Array.isArray(menus) && menus.some(m=>m && ((m.areas&&m.areas.length) || m.bgImageData || (m.name&&m.name!=='メニュー1')));
    const msg='現在の作業内容を新規作成で置き換えます。必要な場合は先にバックアップ保存してください。実行しますか？';
    if(hasWork && !confirm(msg))return;
    try{
      menus.length=0;
      currentMenuId=null;
      selectedAreaId=null;
      ctxTargetId=null;
      if(expandedAreaIds && typeof expandedAreaIds.clear==='function')expandedAreaIds.clear();
      history=[];
      historyIndex=-1;
      dragMoveState=null;
      mode='idle';
      drawStart=drawCurrent=dragOffset=resizeHandle=dragOriginal=null;
      const client=$('clientProjectNameInput');
      const file=$('projectFileName');
      const clientName=$('clientNameInput');
      const clientSelect=$('clientSelect');
      const lineToken=$('lineTokenInput');
      const rememberToken=$('rememberLineToken');
      if(client)client.value=newClientName;
      if(file)file.value=newClientName?newClientName+'_リッチメニュー':'';
      if(clientName)clientName.value=newClientName;
      if(clientSelect)clientSelect.value='';
      if(lineToken)lineToken.value='';
      if(rememberToken)rememberToken.checked=true;
      try{localStorage.removeItem(LINE_TOKEN_LOCAL_KEY);}catch(_e){}
      try{sessionStorage.removeItem(LINE_TOKEN_SESSION_KEY);}catch(_e){}
      createOrSelectClientForNewProject(newClientName);
      createMenu('メニュー1');
      if(typeof updateRightPanelTitles==='function')updateRightPanelTitles();
      if(typeof renderClientSelect==='function')renderClientSelect();
      if(clientSelect)clientSelect.value=currentClientId||'';
      if(typeof renderProjectClientListMenu==='function')renderProjectClientListMenu();
      if(typeof markProjectFileDirty==='function')markProjectFileDirty();
      if(typeof saveProjectToLocal==='function')saveProjectToLocal(false);
      if(typeof updateProjectSaveStatus==='function'){
        updateProjectSaveStatus(newClientName?'新規作成しました｜クライアント追加済み：'+newClientName:'新規作成しました。まだクライアント名は未設定です。','dirty');
      }
      showToast(newClientName?'新規作成＋クライアント追加をしました':'新規作成しました','success');
    }catch(e){
      showToast('新規作成に失敗しました: '+(e&&e.message?e.message:e),'error');
    }
  }
  window.createNewProjectFromRightMenu=createNewProjectFromRightMenu;


  function normalizeProjectInfo(){
    const meta=qs('.project-meta-card');
    if(!meta)return;
    let head=meta.querySelector(':scope > .project-meta-head');
    if(!head){
      head=document.createElement('div');
      head.className='project-meta-head';
      meta.insertBefore(head,meta.firstChild);
    }
    let title=head.querySelector('h3');
    if(!title){
      title=meta.querySelector(':scope > h3') || document.createElement('h3');
      head.insertBefore(title,head.firstChild);
    }
    title.textContent='管理カード';
    meta.querySelectorAll(':scope > h3').forEach(h=>{if(h!==title)h.remove();});
    let grid=meta.querySelector(':scope > .project-meta-grid');
    if(!grid){grid=document.createElement('div');grid.className='project-meta-grid';meta.insertBefore(grid,head.nextSibling);}
    const client=$('clientProjectNameInput');
    const file=$('projectFileName');
    const moveGroup=(input,cls,labelText)=>{
      if(!input)return;
      let group=input.closest('.form-group');
      if(!group){group=document.createElement('div');group.className='form-group';const label=document.createElement('label');label.textContent=labelText;input.parentNode&&input.parentNode.insertBefore(group,input);group.append(label,input);}
      group.classList.add(cls);group.style.cssText='';group.style.display='';
      const label=group.querySelector('label');if(label)label.textContent=labelText;
      if(group.parentElement!==grid)grid.appendChild(group);
    };
    moveGroup(client,'project-info-client-group','クライアント名');
    moveGroup(file,'project-info-file-group','保存ファイル名');
    if(typeof setupProjectClientMenu==='function')setupProjectClientMenu(meta);
    if(typeof ensureProjectAutoSaveControl==='function')ensureProjectAutoSaveControl(meta,grid);
    if(typeof applyProjectScopedTokenVisibility==='function')applyProjectScopedTokenVisibility();
    let actions=meta.querySelector(':scope > .project-meta-actions');
    if(actions && !actions.children.length)actions.remove();
    if(typeof ensureProjectSaveStatusElement==='function')ensureProjectSaveStatusElement(meta);
    const oldNewBtn=$('btnProjectMetaNewProject');
    if(oldNewBtn)oldNewBtn.remove();
    const oldSaveBtn=$('btnProjectMetaSaveOverwrite');
    if(oldSaveBtn)oldSaveBtn.remove();
    // 保存管理（クライアント別）は保存ファイル名の下の展開式メニューへ集約。旧UIは残さない。
    document.querySelectorAll('.client-add-area').forEach(el=>el.remove());
    const apiPanel=qs('#panel-api');
    if(apiPanel){
      apiPanel.querySelectorAll('h3').forEach(h=>{if((h.textContent||'').includes('クライアント'))h.remove();});
    }
    const originalSave=$('btnDownloadProject');if(originalSave)originalSave.style.display='none';
    const originalLoad=$('btnLoadProjectFile');if(originalLoad)originalLoad.style.display='none';
  }


  function organizeBasicSettingsOnly(settings, summary, selectedOverride){
    if(!settings)return;
    const byId=id=>document.getElementById(id);
    const SELECTED_TEXT='トーク画面を開いた時にメニューを最初から表示する';

    const removeIfEmpty=el=>{
      if(el && !el.querySelector('input,select,textarea,button'))el.remove();
    };
    const ensureGroup=(input,labelText,cls)=>{
      if(!input)return null;
      let group=input.closest('.form-group');
      if(!group || group===document.body || group.tagName==='LABEL'){
        group=document.createElement('div');
        group.className='form-group';
        if(input.parentNode)input.parentNode.insertBefore(group,input);
        group.appendChild(input);
      }
      group.classList.add('form-group');
      group.classList.remove(
        'basic-field-menu-name','basic-field-alias','basic-field-size','basic-field-bg','basic-field-chatbar',
        'basic-exact-menu-name','basic-exact-alias','basic-exact-size','basic-exact-bg','basic-exact-chatbar'
      );
      group.classList.add(cls);
      group.style.cssText='';
      group.style.display='';
      let label=group.querySelector(':scope > label') || group.querySelector('label');
      if(!label){label=document.createElement('label');group.insertBefore(label,group.firstChild);}
      label.textContent=labelText;
      if(label.parentElement!==group)group.insertBefore(label,group.firstChild);
      if(input.parentElement!==group)group.appendChild(input);
      return group;
    };
    const makeImageActionsGroup=grid=>{
      const change=byId('btnChangeImage');
      const remove=byId('btnRemoveImage');
      if(!change && !remove)return null;
      const oldParents=[];
      [change,remove].forEach(btn=>{if(btn && btn.parentElement)oldParents.push(btn.parentElement);});
      let group=grid.querySelector(':scope > .basic-exact-image-actions');
      if(!group){group=document.createElement('div');group.className='form-group basic-exact-image-actions';}
      group.className='form-group basic-exact-image-actions';
      let label=group.querySelector(':scope > label');
      if(!label){label=document.createElement('label');group.appendChild(label);}
      label.textContent='画像操作';
      let row=group.querySelector(':scope > .basic-exact-button-row');
      if(!row){row=document.createElement('div');row.className='basic-exact-button-row';group.appendChild(row);}
      if(change)row.appendChild(change);
      if(remove)row.appendChild(remove);
      oldParents.forEach(removeIfEmpty);
      return group;
    };

    const selected=selectedOverride || byId('menuSelected') || settings.querySelector('#menuSelected');
    if(summary){
      summary.className='basic-settings-exact-summary';
      let title=summary.querySelector(':scope > .basic-settings-exact-title');
      if(!title){title=document.createElement('span');title.className='basic-settings-exact-title';}
      title.textContent='基本設定';
      summary.replaceChildren(title);
      const details=summary.parentElement;
      if(selected && details){
        const oldLabel=selected.closest('label');
        const oldGroup=oldLabel && oldLabel.closest('.form-group');
        let selectedLabel=details.querySelector(':scope > .basic-selected-exact-label');
        if(!selectedLabel){
          selectedLabel=document.createElement('label');
          selectedLabel.className='basic-selected-exact-label';
          selectedLabel.title=SELECTED_TEXT;
          summary.insertAdjacentElement('afterend',selectedLabel);
        }
        selectedLabel.className='basic-selected-exact-label';
        selectedLabel.title=SELECTED_TEXT;
        if(selectedLabel.parentElement!==details)summary.insertAdjacentElement('afterend',selectedLabel);
        if(selected.parentElement!==selectedLabel){
          selectedLabel.textContent='';
          selectedLabel.appendChild(selected);
          selectedLabel.appendChild(document.createTextNode(SELECTED_TEXT));
        }
        selected.disabled=false;
        selected.style.pointerEvents='auto';
        selected.style.cursor='pointer';
        selectedLabel.style.pointerEvents='auto';
        selectedLabel.style.cursor='pointer';

        const syncSelected=()=>{
          try{
            if(typeof currentMenu==='function'){
              const m=currentMenu();
              if(m)m.selected=!!selected.checked;
            }
            if(typeof markModified==='function')markModified();
            if(typeof saveHistory==='function')saveHistory();
          }catch(_e){}
        };

        // チェック状態は loadCurrentMenu() と実際のクリックで管理します。
        // ここで毎回 selected.checked を上書きすると、クリック直後のON/OFFが戻る原因になるため行いません。
        if(selected.dataset.basicSelectedBound!=='1'){
          selected.dataset.basicSelectedBound='1';
          selected.addEventListener('change',syncSelected,false);
          selected.addEventListener('click',function(e){e.stopPropagation();},false);
        }
        if(selectedLabel.dataset.basicSelectedLabelBound!=='1'){
          selectedLabel.dataset.basicSelectedLabelBound='1';
          selectedLabel.addEventListener('click',function(e){
            if(e.target===selected)return;
            e.preventDefault();
            e.stopPropagation();
            selected.checked=!selected.checked;
            syncSelected();
            try{selected.dispatchEvent(new Event('change',{bubbles:true}));}catch(_e){}
          },false);
        }
        if(oldLabel && oldLabel!==selectedLabel && !oldLabel.contains(selected))removeIfEmpty(oldLabel);
        if(oldGroup && oldGroup!==selectedLabel && !oldGroup.querySelector('input,select,textarea'))removeIfEmpty(oldGroup);
      }
    }

    let grid=settings.querySelector(':scope > .basic-settings-exact-grid');
    if(!grid){grid=document.createElement('div');grid.className='basic-settings-exact-grid';}
    grid.className='basic-settings-exact-grid';
    if(grid.parentElement!==settings)settings.insertBefore(grid,settings.firstChild);
    const groups=[
      ensureGroup(byId('menuName'),'メニュー名','basic-exact-menu-name'),
      ensureGroup(byId('menuAlias'),'エイリアスID','basic-exact-alias'),
      ensureGroup(byId('menuSize'),'サイズ','basic-exact-size'),
      ensureGroup(byId('bgColor'),'背景色','basic-exact-bg'),
      ensureGroup(byId('chatBarText'),'チャットバーテキスト','basic-exact-chatbar')
    ].filter(Boolean);
    groups.forEach(group=>{if(group.parentElement!==grid)grid.appendChild(group);});
    const imageActions=makeImageActionsGroup(grid);
    if(imageActions && imageActions.parentElement!==grid)grid.appendChild(imageActions);

    settings.querySelectorAll(':scope > .form-row,:scope > .form-group,:scope > .basic-settings-grid-v2,:scope > .image-controls,:scope > .compact-actions').forEach(removeIfEmpty);
    settings.querySelectorAll(':scope > h3').forEach(h=>{if((h.textContent||'').trim()==='背景画像')h.remove();});
  }

  function setupSaveCard(){
    const canvasWrap=qs('.canvas-wrap');
    if(!canvasWrap)return null;
    let card=$(SAVE_CARD_ID);
    if(!card){
      card=document.createElement('div');
      card.id=SAVE_CARD_ID;
      card.className='canvas-save-operation-card';
      canvasWrap.insertAdjacentElement('afterend',card);
    }

    const settings=$('panel-settings') || qs('.settings-main-block') || qs('.save-basic-settings-block');
    const selectedForSettings=$('menuSelected') || (settings&&settings.querySelector('#menuSelected')) || (card&&card.querySelector('#menuSelected'));

    let title=card.querySelector(':scope > .save-card-title');
    if(!title){
      title=document.createElement('div');
      title.className='save-card-title';
      card.insertBefore(title,card.firstChild);
    }
    title.innerHTML='<h3>基本設定</h3><small>メニュー名・画像操作・自動保存状態を確認できます</small>'; 
    qsa(':scope > .save-card-title',card).forEach((el,i)=>{if(i>0)el.remove();});

    if(settings){
      let details=card.querySelector(':scope > .save-basic-settings-details') || settings.closest('.save-basic-settings-details');
      if(!details){
        details=document.createElement('details');
        details.className='save-basic-settings-details';
      }
      details.className='save-basic-settings-details';
      details.open=true;
      if(details.parentElement!==card)card.appendChild(details);
      let summary=details.querySelector(':scope > summary');
      if(!summary){
        summary=document.createElement('summary');
        details.insertBefore(summary,details.firstChild);
      }
      settings.classList.add('save-basic-settings-block');
      settings.style.display='block';
      organizeBasicSettingsOnly(settings,summary,selectedForSettings);
      if(settings.parentElement!==details)details.appendChild(settings);
      qsa(':scope > .save-basic-settings-details',card).forEach((el,i)=>{if(i>0)el.remove();});
    }

    const tabCard=qs('.right-tab-card');
    if(tabCard){
      const saveBtn=tabCard.querySelector('.right-tab-btn[data-tab-key="save"]');
      const savePane=tabCard.querySelector('.right-tab-pane[data-tab-pane="save"]');
      const saveWasActive=(saveBtn&&saveBtn.classList.contains('active'))||(savePane&&savePane.classList.contains('active'));
      if(saveBtn)saveBtn.remove();
      if(savePane)savePane.remove();
      const buttons=qsa('.right-tab-card .right-tab-btn');
      const panes=qsa('.right-tab-card .right-tab-pane');
      if(saveWasActive || !buttons.some(b=>b.classList.contains('active'))){
        buttons.forEach((b,i)=>{b.classList.toggle('active',i===0);b.setAttribute('aria-selected',i===0?'true':'false');});
        panes.forEach(p=>p.classList.toggle('active',p.dataset.tabPane===(buttons[0]&&buttons[0].dataset.tabKey)));
      }
    }
    return card;
  }

  function applyFixedZoom(force){
    try{
      let changed=!!force;
      if(typeof zoom==='number' && Math.abs(zoom-FIXED_ZOOM)>0.001){zoom=FIXED_ZOOM;changed=true;}
      if(typeof fitZoom==='function' && !window.__htmlSingleFixedFitZoom){
        window.__htmlSingleFixedFitZoom=true;
        window.fitZoom=function(){try{zoom=FIXED_ZOOM;if(typeof applyZoom==='function')applyZoom();if(typeof render==='function')render();}catch(e){}};
        try{fitZoom=window.fitZoom;}catch(e){}
      }
      if(changed){if(typeof applyZoom==='function')applyZoom();if(typeof render==='function')render();}
    }catch(e){}
  }


  function boot(){
    ensureLineUiText();normalizeProjectInfo();setupSaveCard();applyFixedZoom(true);document.body.classList.add('ui-ready');
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
  window.addEventListener('load',()=>setTimeout(boot,160),{once:true,passive:true});
})();

<script id="canvasUsageGuideScript">
(function setupCanvasUsageGuide(){
  function ready(fn){
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fn,{once:true});
    else fn();
  }
  ready(function(){
    var wrap=document.querySelector('.canvas-wrap');
    if(!wrap)return;
    var existing=document.getElementById('canvasUsageGuide');
    if(existing)existing.remove();
    var guide=document.createElement('div');
    guide.id='canvasUsageGuide';
    guide.className='canvas-usage-guide';
    var btn=document.createElement('button');
    btn.type='button';
    btn.className='canvas-usage-toggle';
    btn.setAttribute('aria-expanded','false');
    btn.setAttribute('aria-controls','canvasUsagePanel');
    btn.textContent='☰ 使い方';
    var backdrop=document.createElement('div');
    backdrop.className='canvas-usage-backdrop';
    var panel=document.createElement('div');
    panel.id='canvasUsagePanel';
    panel.className='canvas-usage-panel';
    panel.setAttribute('aria-hidden','true');
    panel.innerHTML = ''+
      '<div class="usage-side-head"><strong>使い方</strong><button type="button" class="usage-side-close" aria-label="使い方を閉じる">×</button></div>'+ 
      '<div class="usage-side-body">'+
        '<details class="usage-accordion" open><summary>① 初期設定</summary><div class="usage-section-body"><ol>'+
          '<li><a href="https://developers.line.biz/console/" target="_blank" rel="noopener">LINE Developers Console</a>にログインし、対象のプロバイダーと<a href="https://developers.line.biz/console/" target="_blank" rel="noopener">Messaging APIチャネル</a>を開きます。</li>'+
          '<li><a href="https://developers.line.biz/console/" target="_blank" rel="noopener">Messaging API設定</a>からチャネルアクセストークン（長期）を発行・コピーします。</li>'+
          '<li>保存管理タブの「チャネルアクセストークン」に貼り付けます。</li>'+
          '<li>再発行時は注意してください。長期トークンは1つまでのため、再発行すると古い長期トークンが使えなくなります。再発行後は、このアプリに保存したトークンも新しいものへ差し替えてください。</li>'+
          '<li>必要に応じて、お手軽保存でこのブラウザ内に保存します。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>② 画像エリア設定</summary><div class="usage-section-body"><ol>'+
          '<li>画像エリアをクリック、または画像をドラッグして背景画像を追加します。</li>'+
          '<li>画像はJPEGまたはPNG、1MB以内を目安にしてください。</li>'+
          '<li>Largeは2500×1686px、Compactは2500×843pxが推奨サイズです。</li>'+
          '<li>画像サイズは2500×843px以上、2500×1686px以内で使用してください。</li>'+
          '<li>基本設定では、メニュー名・エイリアスID・サイズ・背景色・チャットバーテキスト・画像変更/削除を設定します。</li>'+
          '<li>「トーク画面を開いた時にメニューを最初から表示する」は、そのリッチメニューが表示対象になった時に、トーク画面でメニューを開いた状態にする設定です。複数メニューでONにしても同時に複数表示されるわけではなく、実際に表示中の1枚にだけ効きます。</li>'+
          '<li>エイリアスIDは、リッチメニュー切替で使う目印です。切替先として使うメニューには、分かりやすく重複しないIDを設定してください。</li>'+
          '<li>エイリアスIDを後から変更すると、切替先エイリアスに設定済みのエリアがつながらなくなる場合があります。変更した時は、切替元のエリア設定も確認してください。</li>'+
          '<li>エイリアスIDは半角英数字・ハイフン・アンダーバー中心で作成すると管理しやすいです。日本語や記号を混ぜると、あとから確認しにくくなります。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>③ エリア設定</summary><div class="usage-section-body"><ol>'+
          '<li>画像の上をドラッグして、タップさせたいエリア範囲を作成します。</li>'+
          '<li>右側のエリア設定で、ラベル・X/Y位置・幅/高さを調整します。</li>'+
          '<li>アクションタイプを選び、URL・メッセージ・Postback・リッチメニュー切替などを設定します。</li>'+
          '<li>不要なエリアは、エリア設定内の削除ボタンで削除できます。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>④ 保存管理</summary><div class="usage-section-body"><ol>'+
          '<li>お手軽保存は、このブラウザ内に作業データを保存します。</li>'+
          '<li>ただし、セキュリティソフトや容量管理ソフトでブラウザ容量が削除されると、お手軽保存のデータが消える可能性があります。</li>'+
          '<li>作業途中や納品前など、定期的にバックアップ保存も行ってください。</li>'+
          '<li>違うブラウザなどで開くと反映されない場合があるため、Google Chromeで開くようにお願いします。</li>'+
          '<li>JSONファイル読み込みから、保存した設定データを読み込めます。</li>'+
          '<li>保存管理（クライアント管理）のクライアントカードにある「ブラウザ保存削除」を押すと、そのクライアントのブラウザ内保存だけを削除できます。削除前に「はい、削除する / いいえ」の確認が出ます。</li>'+
          '<li>LINEに反映は、現在のリッチメニューをLINE上で全員表示する時に使います。</li>'+
          '<li>LINE表示を停止は、LINE上で全員表示されているリッチメニュー設定を外す時に使います。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>⑤ 個別設定</summary><div class="usage-section-body"><ol>'+
          '<li>確認用ユーザーIDは、<a href="https://developers.line.biz/console/" target="_blank" rel="noopener">LINE Developers Console</a>で対象チャネルを開き、<a href="https://developers.line.biz/console/" target="_blank" rel="noopener">チャネル基本設定</a>タブの「あなたのユーザーID」で確認できます。Uから始まるIDをコピーして使います。</li>'+
          '<li>確認用ユーザーIDを入力すると、自分に個別リンク中のリッチメニューID確認に使えます。</li>'+
          '<li>登録ユーザーを追加すると、個別リンクやリンク解除の対象として管理できます。</li>'+
          '<li>個別リンク履歴には、誰にリンクしたか・解除したか・対象メニュー・日時をアプリ内に記録できます。</li>'+
          '<li>表示優先度は、個別リンク中のリッチメニューがデフォルト設定より優先されます。</li>'+
          '<li>そのため、LINEに反映しても、対象ユーザーに個別リンクが残っている場合は個別リンク中のリッチメニューが表示されます。</li>'+
          '<li>デフォルト表示を確認したい場合は、先に対象ユーザーの個別リンクを解除してから確認してください。</li>'+
          '<li>優先度の目安は「個別リンク ＞ Messaging APIのデフォルト ＞ LINE Official Account Managerのデフォルト」です。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>⑥ リッチメニューID管理</summary><div class="usage-section-body"><ol>'+
          '<li>リッチメニューID（richMenuId）は、<a href="https://developers.line.biz/console/" target="_blank" rel="noopener">LINE Developers Console</a> / <a href="https://developers.line.biz/ja/reference/messaging-api/#rich-menu" target="_blank" rel="noopener">Messaging API</a>側で、反映済みリッチメニューを見分けるためのIDです。</li>'+
          '<li>LINEに反映した後は、対象メニューにrichMenuIdが保存されます。未反映の場合は「未取得」になります。</li>'+
          '<li>「現在のデフォルトrichMenuId確認」は、全員表示に設定されているリッチメニューIDを確認する時に使います。</li>'+
          '<li>「自分に個別リンク中のrichMenuId確認」は、確認用ユーザーIDに個別リンクされているリッチメニューIDを確認する時に使います。</li>'+
          '<li>個別リンク中のIDがある場合、そのユーザーにはデフォルトより個別リンク中のリッチメニューが優先表示されます。</li>'+
          '<li>後から同じリッチメニューを再利用・停止・確認したい場合に必要になるため、バックアップ保存でJSONとPNGを残しておくと安全です。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>⑦ Q＆A・トラブル対応</summary><div class="usage-section-body">'+
          '<details class="usage-qa"><summary>LINEに反映したのに表示されない</summary><div class="usage-qa-body"><ul><li>チャネルアクセストークンが正しいか確認します。</li><li>画像サイズがLarge/Compactの範囲に合っているか確認します。</li><li>LINEに反映後、全員表示したい場合はLINEに反映ボタンと自動全員表示設定を確認します。</li><li>特定のユーザーだけ表示が違う場合は、個別リンク中のリッチメニューIDを確認します。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>LINE表示を停止したのに、まだ表示される</summary><div class="usage-qa-body"><ul><li>LINE表示を停止で外れるのは、全員表示の設定です。</li><li>個別リンクが残っているユーザーには、個別リンク中のリッチメニューが優先表示されます。</li><li>確認用ユーザーIDで個別リンク中のIDを確認し、必要なら個別リンク解除を行ってください。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>リッチメニュー切替が動かない</summary><div class="usage-qa-body"><ul><li>切替先のエイリアスIDが設定されているか確認します。</li><li>エリア設定の「切替先エイリアス」と、切替先メニューのエイリアスIDが同じか確認します。</li><li>エイリアスIDを変更した場合は、切替元のエリア設定も更新してください。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>JSONを読み込んだのに画像が出ない</summary><div class="usage-qa-body"><ul><li>バックアップ保存はJSONとPNG画像を分けて保存します。</li><li>JSON読み込み後に、対応するPNG画像も選択してください。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>URLボタンが開かない</summary><div class="usage-qa-body"><ul><li>アクションタイプがURLになっているか確認します。</li><li>URLは https:// から入力してください。</li><li>エリア範囲が小さ過ぎないか、他のエリアと重なっていないか確認してください。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>クライアントに渡した後、編集内容を反映したい</summary><div class="usage-qa-body"><ul><li>クライアント側で通常版を開き、JSONとPNGを読み込みます。</li><li>チャネルアクセストークンが入っている状態でLINEに反映します。</li><li>全員に表示したい場合は、LINE反映後に全員表示される設定になっているか確認してください。</li></ul></div></details>'+
          '<details class="usage-qa"><summary>操作ミスが心配な時</summary><div class="usage-qa-body"><ul><li>LINEに反映する前に、バックアップ保存でJSONとPNGを残してください。</li><li>LINE表示を停止しても、リッチメニュー本体は削除されません。</li><li>完全に消したい場合だけ、LINE Developers側のリッチメニュー削除を検討してください。</li></ul></div></details>'+
        '</div></details>'+ 
        '<details class="usage-accordion"><summary>⑧ 利用・更新について</summary><div class="usage-section-body"><p>本ツールは、できる限り継続して更新・改善を行います。ただし、LINE公式アカウントや外部サービスの仕様変更により、予告なく一部機能の修正・停止が必要になる場合があります。その場合は、代替手段や運用方法をご案内します。</p></div></details>'+ 
        '<details class="usage-accordion"><summary>⑨ クラウド管理</summary><div class="usage-section-body"><ol>'+
          '<li>管理カードの「保存管理（クライアント管理）を開く」を開き、クラウド保存（Googleスプレッドシート）を使用します。</li>'+
          '<li>Apps Script用コードをコピーし、Google Apps Scriptに貼り付けてWebアプリとして公開します。</li>'+
          '<li>公開後に発行されたApps Script URLを、クラウド保存のURL欄へ貼り付けます。</li>'+
          '<li>最初に接続テストを行い、接続OKになってからクラウドに保存してください。</li>'+
          '<li>クラウド保存欄は初期状態で開いたまま表示されます。上部の「📊 保存先スプレッドシートを開く」ボタンから、保存先スプレッドシートを直接開けます。</li>'+
          '<li>クラウドに保存すると、クライアント名・保存ファイル名・メニュー情報・画像・チャネルアクセストークンを含む作業データを保存できます。</li>'+
          '<li>クラウドから読み込む時は、現在の編集中データが置き換わるため、必要に応じて先にお手軽保存またはバックアップ保存を行ってください。</li>'+
          '<li>Apps Script URLを変更すると保存先が変わります。別の保存先に切り替える時は、URLが正しいか接続テストで確認してください。</li>'+
          '<li>Googleアカウント側のスプレッドシートやDrive内の保存ファイルを削除すると、アプリから読み込めなくなります。</li>'+
        '</ol></div></details>'+ 
        '<details class="usage-accordion"><summary>⑩ Apps Script設定手順</summary><div class="usage-section-body">'+
          '<p><strong>最初に1回だけ行う設定です。</strong><br>この設定をすると、画像込みプロジェクトをGoogle Driveへ保存し、保存一覧をGoogleスプレッドシートで管理できるようになります。</p>'+
          '<ol>'+
            '<li>リッチメニュープラス右側の「保存管理（クライアント管理）を開く」を開きます。</li>'+
            '<li>「クラウド保存（Googleスプレッドシート）」を開きます。</li>'+
            '<li>「Apps Script用コードを開く」を押します。</li>'+
            '<li>「コードをコピー」を押して、表示されたコードをコピーします。</li>'+
            '<li><a href="https://script.google.com/" target="_blank" rel="noopener">Google Apps Script</a>を開きます。</li>'+
            '<li>「新しいプロジェクト」を押します。</li>'+
            '<li>プロジェクト名を「リッチメニュープラス_クラウド保存」など、分かりやすい名前に変更します。</li>'+
            '<li>最初から入っている <code>function myFunction()</code> などのコードをすべて削除します。</li>'+
            '<li>先ほどコピーしたApps Script用コードを貼り付けます。</li>'+
            '<li>上部の保存アイコン、または <code>Ctrl + S</code> で保存します。</li>'+
            '<li>右上の「デプロイ」→「新しいデプロイ」を押します。</li>'+
            '<li>種類の選択で歯車アイコン、または「種類を選択」から「ウェブアプリ」を選びます。</li>'+
            '<li>説明欄には「リッチメニュープラス クラウド保存」などを入力します。</li>'+
            '<li>「次のユーザーとして実行」は「自分」を選びます。これにより、保存用のスプレッドシートとDriveフォルダが自分のGoogleアカウント内に作成されます。</li>'+
            '<li>「アクセスできるユーザー」は「全員」を選びます。リッチメニュープラスから呼び出すため、この設定が必要です。</li>'+
            '<li>「デプロイ」を押します。</li>'+
            '<li>初回はGoogleの承認画面が出ます。「アクセスを承認」を押します。</li>'+
            '<li>「このアプリはGoogleで確認されていません」と表示された場合は、「詳細」→「プロジェクト名に移動」を押し、内容を確認して許可します。</li>'+
            '<li>承認後に表示される「ウェブアプリURL」をコピーします。URLの末尾は通常 <code>/exec</code> です。</li>'+
            '<li>リッチメニュープラスに戻り、「Apps Script URL」欄にコピーしたURLを貼り付けます。</li>'+
            '<li>「接続テスト」を押します。</li>'+
            '<li>「接続OK」と表示されたら設定完了です。この時点で、Google Driveに <code>RichMenuPlus_CloudData</code> フォルダ、Googleスプレッドシートに <code>リッチメニュープラス_クラウド保存</code> が作成されます。</li>'+
            '<li>必要に応じて「保存先シートを開く」を押すと、作成されたスプレッドシートを確認できます。</li>'+
            '<li>クライアント名と保存ファイル名を入力し、「クラウドに保存」を押すと、画像込みプロジェクトがGoogle Driveに保存されます。</li>'+
            '<li>次回以降は「クラウド保存一覧を更新」→保存データを選択→「クラウドから読み込み」で復元できます。</li>'+
          '</ol>'+
          '<p><strong>2回目以降の使い方</strong></p>'+
          '<ol>'+
            '<li>リッチメニュープラスを開きます。</li>'+
            '<li>保存管理のクラウド保存を開きます。</li>'+
            '<li>Apps Script URLが入っていることを確認します。</li>'+
            '<li>「一覧取得」を押します。</li>'+
            '<li>読み込みたいクライアント・保存データを選び、「クラウドから読み込み」を押します。</li>'+
          '</ol>'+
          '<p><strong>Apps Script URLが分からなくなった時</strong></p>'+
          '<ol>'+
            '<li><a href="https://script.google.com/" target="_blank" rel="noopener">Google Apps Script</a>を開きます。</li>'+
            '<li>一覧から、クラウド保存用に作成したプロジェクトを開きます。名前を変更していなければ「無題のプロジェクト」になっている場合もあります。</li>'+
            '<li>右上の「デプロイ」→「デプロイを管理」を押します。</li>'+
            '<li>種類が「ウェブアプリ」になっているデプロイを開きます。</li>'+
            '<li>表示されている「ウェブアプリURL」をコピーします。URLの末尾は通常 <code>/exec</code> です。</li>'+
            '<li>リッチメニュープラスに戻り、「Apps Script URL」欄へ貼り付けます。</li>'+
            '<li>「接続テスト」を押して、接続OKになるか確認します。</li>'+
          '</ol>'+
          '<p><strong>デプロイを管理にURLが表示されない時</strong></p>'+
          '<ul>'+
            '<li>まだWebアプリとしてデプロイできていない可能性があります。「デプロイ」→「新しいデプロイ」から、種類を「ウェブアプリ」にして再度デプロイしてください。</li>'+
            '<li>デプロイ後に出るURLは、必ずコピーしてリッチメニュープラス側に貼り付けてください。</li>'+
            '<li>スクリプトのコードを修正した後は、「デプロイを管理」→鉛筆アイコン→バージョンを「新バージョン」にして保存すると、最新コードが反映されます。</li>'+
          '</ul>'+
          '<p><strong>スプレッドシートの見出しについて</strong></p>'+
          '<ul>'+
            '<li>今回の版では、クラウド保存用スプレッドシートの項目名を日本語で作成・更新します。</li>'+
            '<li>以前の英語見出しのシートがある場合も、接続テストや保存時に日本語見出しへ整えます。</li>'+
            '<li>既存の保存データは同じ列順で読み取るため、そのまま使えます。</li>'+
          '</ul>'+
          '<p><strong>うまく接続できない時</strong></p>'+
          '<ul>'+
            '<li>Apps Script URLが <code>/exec</code> で終わっているか確認してください。<code>/dev</code> のURLではなく、デプロイ後のウェブアプリURLを使います。</li>'+
            '<li>デプロイ設定の「次のユーザーとして実行」が「自分」になっているか確認してください。</li>'+
            '<li>「アクセスできるユーザー」が「全員」になっているか確認してください。</li>'+
            '<li>コードを修正した場合は、Apps Scriptの「デプロイを管理」から新しいバージョンとして再デプロイしてください。</li>'+
            '<li>保存先のスプレッドシートやDriveフォルダを削除した場合は、接続テストを押すと再作成されます。</li>'+
          '</ul>'+
        '</div></details>'+ 
      '</div>';
    guide.appendChild(backdrop);
    guide.appendChild(panel);
    guide.appendChild(btn);
    wrap.appendChild(guide);
    var closeBtn=panel.querySelector('.usage-side-close');
    function setGuideOpen(open){
      guide.classList.toggle('open',open);
      btn.setAttribute('aria-expanded',open?'true':'false');
      panel.setAttribute('aria-hidden',open?'false':'true');
    }
    btn.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      setGuideOpen(!guide.classList.contains('open'));
    });
    if(closeBtn)closeBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setGuideOpen(false);});
    backdrop.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setGuideOpen(false);});
    panel.addEventListener('click',function(e){e.stopPropagation();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')setGuideOpen(false);});
  });
})();
</script>

<script id="googleSheetsCloudSaveScript">
(function(){
  'use strict';
  const ENDPOINT_KEY='richmenu_plus_cloud_apps_script_url_v1';
  const SELECTED_ID_KEY='richmenu_plus_cloud_selected_id_v1';
  const SPREADSHEET_URL_KEY='richmenu_plus_cloud_spreadsheet_url_v1';
  const $=id=>document.getElementById(id);
  const qs=sel=>document.querySelector(sel);
  const APPS_SCRIPT_TEMPLATE = String.raw`const SHEET_NAME = 'クラウド保存一覧';
const LEGACY_SHEET_NAME = 'richmenu_plus_cloud_index';
const FOLDER_NAME = 'RichMenuPlus_CloudData';
const HEADERS_JA = ['クラウドID','クライアント名','保存名','更新日時','DriveファイルID','トークン保存','メニュー数','メモ'];
const FIELD_KEYS = ['cloudId','clientName','projectName','updatedAt','fileId','tokenIncluded','menuCount','note'];

function doGet(e) {
  const p = (e && e.parameter) || {};
  const result = handleRequest(p);
  return output(result, p.callback);
}

function doPost(e) {
  let req = {};
  try {
    const raw = e && e.postData && e.postData.contents ? e.postData.contents : '';
    req = raw ? JSON.parse(raw) : {};
  } catch (err) {
    try {
      req = JSON.parse((e && e.parameter && e.parameter.payload) || '{}');
    } catch (err2) {
      req = {};
    }
  }
  return output(handleRequest(req));
}

function output(obj, callback) {
  const json = JSON.stringify(obj);
  if (callback) {
    return ContentService.createTextOutput(callback + '(' + json + ');')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ContentService.createTextOutput(json).setMimeType(ContentService.MimeType.JSON);
}

function handleRequest(req) {
  const action = String(req.action || 'test');
  if (action === 'test') return testConnection();
  if (action === 'save') return saveProject(req);
  if (action === 'list') return listProjects();
  if (action === 'load') return loadProject(req);
  if (action === 'spreadsheet') return getSpreadsheetInfo();
  return { ok:false, message:'未対応の処理です: ' + action };
}

function getSpreadsheet() {
  const props = PropertiesService.getScriptProperties();
  const savedId = props.getProperty('SPREADSHEET_ID');
  if (savedId) return SpreadsheetApp.openById(savedId);
  const ss = SpreadsheetApp.create('リッチメニュープラス_クラウド保存');
  props.setProperty('SPREADSHEET_ID', ss.getId());
  return ss;
}

function getSheet() {
  const ss = getSpreadsheet();
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) {
    sheet = ss.getSheetByName(LEGACY_SHEET_NAME);
    if (sheet) {
      try { sheet.setName(SHEET_NAME); } catch (_) {}
    }
  }
  if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
  ensureJapaneseHeaders(sheet);
  return sheet;
}

function ensureJapaneseHeaders(sheet) {
  if (sheet.getLastRow() === 0) {
    sheet.appendRow(HEADERS_JA);
    return;
  }
  const range = sheet.getRange(1, 1, 1, HEADERS_JA.length);
  const current = range.getValues()[0].map(v => String(v || ''));
  const needsUpdate = HEADERS_JA.some((h, i) => current[i] !== h);
  if (needsUpdate) range.setValues([HEADERS_JA]);
}

function getFolder() {
  const props = PropertiesService.getScriptProperties();
  const savedId = props.getProperty('FOLDER_ID');
  if (savedId) return DriveApp.getFolderById(savedId);
  const folder = DriveApp.createFolder(FOLDER_NAME);
  props.setProperty('FOLDER_ID', folder.getId());
  return folder;
}

function getSpreadsheetInfo() {
  const ss = getSpreadsheet();
  getSheet();
  getFolder();
  return { ok:true, message:'保存先スプレッドシートを取得しました', spreadsheetUrl:ss.getUrl(), spreadsheetId:ss.getId() };
}

function testConnection() {
  const info = getSpreadsheetInfo();
  return { ok:true, message:'接続OK', spreadsheetUrl:info.spreadsheetUrl, spreadsheetId:info.spreadsheetId };
}

function rowsAsObjects(sheet) {
  const values = sheet.getDataRange().getValues();
  if (values.length < 2) return [];
  return values.slice(1).filter(r => r[0]).map((row, i) => {
    const obj = { rowNumber:i + 2 };
    FIELD_KEYS.forEach((key, idx) => obj[key] = row[idx]);
    return obj;
  });
}

function saveProject(req) {
  const sheet = getSheet();
  const folder = getFolder();
  const dataText = typeof req.data === 'string' ? req.data : JSON.stringify(req.data || {});
  const clientName = String(req.clientName || '未設定クライアント');
  const projectName = String(req.projectName || 'リッチメニュー');
  const cloudId = String(req.cloudId || Utilities.getUuid());
  const rows = rowsAsObjects(sheet);
  let row = rows.find(r => String(r.cloudId) === cloudId) || rows.find(r => String(r.clientName) === clientName && String(r.projectName) === projectName);
  let file;
  if (row && row.fileId) {
    file = DriveApp.getFileById(String(row.fileId));
    file.setContent(dataText);
  } else {
    file = folder.createFile(cloudId + '.json', dataText, MimeType.PLAIN_TEXT);
  }
  const dataObj = JSON.parse(dataText);
  const values = [
    cloudId,
    clientName,
    projectName,
    new Date(),
    file.getId(),
    dataObj.tokenIncluded ? 'あり' : 'なし',
    Array.isArray(dataObj.menus) ? dataObj.menus.length : '',
    req.note || ''
  ];
  if (row) sheet.getRange(row.rowNumber, 1, 1, values.length).setValues([values]);
  else sheet.appendRow(values);
  return { ok:true, message:'クラウド保存しました', cloudId:cloudId, spreadsheetUrl:getSpreadsheet().getUrl() };
}

function listProjects() {
  const sheet = getSheet();
  const list = rowsAsObjects(sheet).map(r => ({
    cloudId:String(r.cloudId || ''),
    clientName:String(r.clientName || ''),
    projectName:String(r.projectName || ''),
    updatedAt:r.updatedAt instanceof Date ? r.updatedAt.toISOString() : String(r.updatedAt || ''),
    tokenIncluded:String(r.tokenIncluded || ''),
    menuCount:String(r.menuCount || '')
  })).sort((a,b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
  return { ok:true, list:list, spreadsheetUrl:getSpreadsheet().getUrl() };
}

function loadProject(req) {
  const sheet = getSheet();
  const cloudId = String(req.cloudId || '');
  const rows = rowsAsObjects(sheet);
  const row = rows.find(r => String(r.cloudId) === cloudId);
  if (!row) return { ok:false, message:'保存データが見つかりません' };
  const text = DriveApp.getFileById(String(row.fileId)).getBlob().getDataAsString('UTF-8');
  return { ok:true, data:JSON.parse(text), item:{ cloudId:cloudId, clientName:row.clientName, projectName:row.projectName, updatedAt:row.updatedAt } };
}
`;

  function toast(msg,type){
    if(typeof showToast==='function')showToast(msg,type||'success');
  }
  function currentClientName(){
    if(typeof currentClientProjectName==='function')return currentClientProjectName();
    const input=$('clientProjectNameInput');
    return (input&&input.value.trim())||'未設定クライアント';
  }
  function currentProjectName(){
    const input=$('projectFileName');
    return (input&&input.value.trim())||(typeof currentMenu==='function'&&currentMenu()?currentMenu().name:'リッチメニュー')||'リッチメニュー';
  }
  function escapeText(value){
    return String(value||'').replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];});
  }
  function cloudIdFromCurrent(){
    const base=currentClientName()+'::'+currentProjectName();
    let hash=0;
    for(let i=0;i<base.length;i++)hash=((hash<<5)-hash+base.charCodeAt(i))|0;
    return 'rmp_'+Math.abs(hash)+'_'+base.replace(/[^a-zA-Z0-9一-龥ぁ-んァ-ンー_-]+/g,'_').slice(0,40);
  }
  function setStatus(msg,type){
    const box=$('cloudSaveStatus');
    if(box){
      box.textContent=msg;
      box.classList.add('show');
      box.classList.toggle('error',type==='error');
    }
    if(type==='error')toast(msg,'error');
  }
  function endpoint(){
    const input=$('cloudSaveEndpointInput');
    return input?input.value.trim():'';
  }
  function saveEndpoint(){
    const url=endpoint();
    try{localStorage.setItem(ENDPOINT_KEY,url);}catch(e){}
    if(typeof markProjectFileDirty==='function')markProjectFileDirty();
  }
  function rememberSpreadsheetUrl(result){
    const url=result&&result.spreadsheetUrl?String(result.spreadsheetUrl):'';
    if(!url)return '';
    try{localStorage.setItem(SPREADSHEET_URL_KEY,url);}catch(e){}
    return url;
  }
  function requireEndpoint(){
    const url=endpoint();
    if(!url){setStatus('Apps ScriptのURLを入力してください。','error');return ''}
    saveEndpoint();
    return url;
  }
  function makePayload(){
    if(typeof projectData!=='function')throw new Error('保存データを作成できません。');
    const data=projectData({includeImages:true,saveKind:'cloud'});
    data.exportType='cloud-project';
    data.cloudSavedAt=new Date().toISOString();
    return data;
  }
  async function postJson(url,payload){
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const text=await res.text();
    try{return JSON.parse(text)}catch(e){throw new Error('応答を読み取れませんでした。Apps Scriptの公開設定を確認してください。')}
  }
  function jsonp(url,params){
    return new Promise((resolve,reject)=>{
      const cb='rmpCloudCb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
      const script=document.createElement('script');
      const timer=setTimeout(()=>{cleanup();reject(new Error('接続がタイムアウトしました。'))},20000);
      function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
      window[cb]=data=>{cleanup();resolve(data)};
      const usp=new URLSearchParams({...params,callback:cb});
      script.src=url+(url.includes('?')?'&':'?')+usp.toString();
      script.onerror=()=>{cleanup();reject(new Error('Apps Scriptに接続できませんでした。'))};
      document.body.appendChild(script);
    });
  }
  function submitFallback(url,payload){
    const iframe=document.createElement('iframe');
    iframe.name='cloudSaveHiddenFrame_'+Date.now();
    iframe.style.display='none';
    const form=document.createElement('form');
    form.method='POST';
    form.action=url;
    form.target=iframe.name;
    form.style.display='none';
    const input=document.createElement('input');
    input.type='hidden';
    input.name='payload';
    input.value=JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(iframe);
    document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{form.remove();iframe.remove();},10000);
  }
  async function cloudTest(){
    const url=requireEndpoint(); if(!url)return;
    setStatus('接続確認中...');
    try{
      let result;
      try{result=await postJson(url,{action:'test'});}catch(_){result=await jsonp(url,{action:'test'});}
      if(!result.ok)throw new Error(result.message||'接続に失敗しました。');
      rememberSpreadsheetUrl(result);
      setStatus('接続OKです。保存先スプレッドシートを確認できます。');
      toast('クラウド保存の接続を確認しました','success');
    }catch(e){setStatus('接続確認失敗：'+e.message,'error');}
  }
  async function cloudSave(){
    const url=requireEndpoint(); if(!url)return;
    let data;
    try{data=makePayload();}catch(e){setStatus(e.message,'error');return;}
    const payload={action:'save',cloudId:cloudIdFromCurrent(),clientName:currentClientName(),projectName:currentProjectName(),data:JSON.stringify(data)};
    setStatus('クラウド保存中...');
    try{
      const result=await postJson(url,payload);
      if(!result.ok)throw new Error(result.message||'保存に失敗しました。');
      rememberSpreadsheetUrl(result);
      try{localStorage.setItem(SELECTED_ID_KEY,result.cloudId||payload.cloudId);}catch(e){}
      if(typeof updateProjectSaveStatus==='function')updateProjectSaveStatus('クラウド保存済み '+new Date().toLocaleString()+'｜保存先：'+currentClientName(),'saved');
      setStatus('クラウド保存しました。');
      toast('クラウド保存しました','success');
      cloudList(false);
    }catch(e){
      submitFallback(url,payload);
      setStatus('保存リクエストを送信しました。数秒後に「一覧取得」で保存状況を確認してください。');
      toast('クラウド保存を送信しました','success');
    }
  }
  async function cloudList(showMessage=true){
    const url=requireEndpoint(); if(!url)return;
    if(showMessage)setStatus('クラウド一覧を取得中...');
    try{
      const result=await jsonp(url,{action:'list'});
      if(!result.ok)throw new Error(result.message||'一覧取得に失敗しました。');
      rememberSpreadsheetUrl(result);
      const select=$('cloudProjectSelect');
      if(select){
        const savedId=localStorage.getItem(SELECTED_ID_KEY)||'';
        const list=Array.isArray(result.list)?result.list:[];
        select.innerHTML='<option value="">クラウド保存データを選択</option>'+list.map(item=>{
          const label=(item.clientName||'未設定')+' / '+(item.projectName||'リッチメニュー')+(item.updatedAt?' / '+String(item.updatedAt).slice(0,10):'');
          return '<option value="'+escapeText(item.cloudId)+'">'+escapeText(label)+'</option>';
        }).join('');
        if(savedId)select.value=savedId;
      }
      if(showMessage){setStatus('クラウド一覧を取得しました。');toast('クラウド一覧を取得しました','success');}
    }catch(e){setStatus('一覧取得失敗：'+e.message,'error');}
  }
  async function cloudLoad(){
    const url=requireEndpoint(); if(!url)return;
    const select=$('cloudProjectSelect');
    const cloudId=(select&&select.value)||localStorage.getItem(SELECTED_ID_KEY)||'';
    if(!cloudId){setStatus('読み込むクラウド保存データを選択してください。','error');return;}
    if(!confirm('現在の編集中データを、クラウド保存データで置き換えますか？'))return;
    setStatus('クラウドから読み込み中...');
    try{
      const result=await jsonp(url,{action:'load',cloudId});
      if(!result.ok)throw new Error(result.message||'読み込みに失敗しました。');
      if(typeof loadProjectData!=='function')throw new Error('読み込み処理が見つかりません。');
      loadProjectData(result.data);
      if(typeof saveProjectToLocal==='function')saveProjectToLocal(false);
      try{localStorage.setItem(SELECTED_ID_KEY,cloudId);}catch(e){}
      setStatus('クラウド保存データを読み込みました。');
      toast('クラウドから読み込みました','success');
    }catch(e){setStatus('読み込み失敗：'+e.message,'error');}
  }
  async function cloudOpenSpreadsheet(){
    const url=requireEndpoint(); if(!url)return;
    const opened=window.open('about:blank','_blank');
    setStatus('保存先スプレッドシートを取得中...');
    try{
      let result;
      try{result=await jsonp(url,{action:'spreadsheet'});}catch(_){result=await jsonp(url,{action:'test'});}
      if(!result.ok)throw new Error(result.message||'保存先スプレッドシートを取得できませんでした。');
      const sheetUrl=rememberSpreadsheetUrl(result);
      if(!sheetUrl)throw new Error('スプレッドシートURLが返ってきませんでした。Apps Scriptコードを最新版に更新してください。');
      if(opened){try{opened.opener=null;}catch(_){} opened.location.href=sheetUrl;}
      else window.open(sheetUrl,'_blank','noopener');
      setStatus('保存先スプレッドシートを開きました。');
      toast('保存先スプレッドシートを開きました','success');
    }catch(e){
      if(opened)opened.close();
      const cached=localStorage.getItem(SPREADSHEET_URL_KEY)||'';
      if(cached){
        window.open(cached,'_blank','noopener');
        setStatus('保存済みのURLでスプレッドシートを開きました。');
        return;
      }
      setStatus('スプレッドシートを開けませんでした：'+e.message,'error');
    }
  }
  async function copyScriptCode(){
    try{
      await navigator.clipboard.writeText(APPS_SCRIPT_TEMPLATE);
      toast('Apps Scriptコードをコピーしました','success');
      setStatus('Apps Scriptコードをコピーしました。');
    }catch(e){
      const area=$('cloudAppsScriptCode');
      if(area){area.focus();area.select();}
      setStatus('コピーできない場合は、コード欄を選択してコピーしてください。','error');
    }
  }
  function bindCloudOpenSheetButtons(){
    const top=$('btnCloudOpenSheetTop');
    if(top && !top.dataset.bound){top.dataset.bound='1';top.addEventListener('click',cloudOpenSpreadsheet);}
    const old=$('btnCloudOpenSheet');
    if(old && !old.dataset.bound){old.dataset.bound='1';old.addEventListener('click',cloudOpenSpreadsheet);}
  }
  function ensureVisibleOpenSheetButton(){
    const body=qs('#cloudSaveDetails .cloud-save-body');
    if(!body)return;
    let row=$('cloudOpenSheetTopRow');
    if(!row){
      row=document.createElement('div');
      row.id='cloudOpenSheetTopRow';
      row.className='cloud-save-actions cloud-sheet-open-row';
      row.innerHTML='<button type="button" id="btnCloudOpenSheetTop" class="cloud-primary">📊 保存先スプレッドシートを開く</button>';
      const note=body.querySelector('.cloud-save-note');
      if(note && note.nextSibling)body.insertBefore(row,note.nextSibling);
      else body.insertBefore(row,body.firstChild);
    }
    bindCloudOpenSheetButtons();
  }
  function ensureCloudSaveUi(){
    const body=qs('#projectClientMenuPanel .client-manager-body');
    const metaGrid=qs('.project-meta-card .project-meta-grid');
    const target=body || metaGrid;
    if(!target)return;
    let details=$('cloudSaveDetails');
    const listBox=qs('#projectClientMenuPanel .client-manager-list');
    if(details){
      if(body && details.parentElement!==body){
        if(listBox && listBox.parentElement===body)body.insertBefore(details,listBox);
        else body.appendChild(details);
      }else if(!body && metaGrid && details.parentElement!==metaGrid){
        metaGrid.appendChild(details);
      }
      ensureVisibleOpenSheetButton();
      return;
    }
    details=document.createElement('details');
    details.id='cloudSaveDetails';
    details.className='cloud-save-details';
    details.open=true;
    details.innerHTML='<summary>☁ クラウド保存（Apps Script・Googleスプレッドシート）</summary>'+
      '<div class="cloud-save-body">'+
        '<div class="cloud-save-note">Apps ScriptのWebアプリURLを設定すると、クライアント別データをクラウドに保存できます。ブラウザ保存はそのまま残り、クライアント数が増えた時の管理用として使えます。</div>'+
        '<div class="cloud-save-actions cloud-sheet-open-row" id="cloudOpenSheetTopRow"><button type="button" id="btnCloudOpenSheetTop" class="cloud-primary">📊 保存先スプレッドシートを開く</button></div>'+
        '<div class="cloud-save-grid">'+
          '<div class="cloud-save-field"><label for="cloudSaveEndpointInput">Apps Script URL</label><input type="url" id="cloudSaveEndpointInput" placeholder="https://script.google.com/macros/s/xxxxx/exec"></div>'+
          '<div class="cloud-save-field"><label for="cloudProjectSelect">クラウド保存データ</label><select id="cloudProjectSelect"><option value="">クラウド保存データを選択</option></select></div>'+
        '</div>'+
        '<div class="cloud-save-actions">'+
          '<button type="button" id="btnCloudOpenSheet" class="cloud-primary">📊 保存先スプレッドシートを開く</button>'+
          '<button type="button" id="btnCloudSaveTest">接続テスト</button>'+
          '<button type="button" id="btnCloudSave" class="cloud-primary">クラウドに保存</button>'+
          '<button type="button" id="btnCloudLoad">クラウドから読み込み</button>'+
          '<button type="button" id="btnCloudList">一覧取得</button>'+
        '</div>'+
        '<div class="cloud-save-status" id="cloudSaveStatus"></div>'+
        '<details class="cloud-script-details"><summary>Apps Script用コードを開く</summary><div class="cloud-script-inner">'+
          '<div class="cloud-save-note">Google Apps Scriptに貼り付けてWebアプリとして公開し、発行されたURLを上の欄に設定してください。</div>'+
          '<button type="button" class="btn btn-sm" id="btnCopyCloudScript">コードをコピー</button>'+
          '<div class="cloud-save-field"><textarea id="cloudAppsScriptCode" readonly></textarea></div>'+
        '</div></details>'+
      '</div>';
    const insertBody=qs('#projectClientMenuPanel .client-manager-body');
    const insertList=qs('#projectClientMenuPanel .client-manager-list');
    if(insertBody){
      if(insertList && insertList.parentElement===insertBody)insertBody.insertBefore(details,insertList);
      else insertBody.appendChild(details);
    }else if(metaGrid){
      metaGrid.appendChild(details);
    }else{
      target.appendChild(details);
    }
    const input=$('cloudSaveEndpointInput');
    if(input){
      try{input.value=localStorage.getItem(ENDPOINT_KEY)||'';}catch(e){}
      input.addEventListener('input',saveEndpoint);
      input.addEventListener('change',saveEndpoint);
      input.addEventListener('blur',saveEndpoint);
    }
    const code=$('cloudAppsScriptCode');
    if(code)code.value=APPS_SCRIPT_TEMPLATE;
    const select=$('cloudProjectSelect');
    if(select)select.addEventListener('change',e=>{try{localStorage.setItem(SELECTED_ID_KEY,e.target.value||'')}catch(_){}});
    const test=$('btnCloudSaveTest'); if(test)test.addEventListener('click',cloudTest);
    const save=$('btnCloudSave'); if(save)save.addEventListener('click',cloudSave);
    const load=$('btnCloudLoad'); if(load)load.addEventListener('click',cloudLoad);
    const list=$('btnCloudList'); if(list)list.addEventListener('click',()=>cloudList(true));
    bindCloudOpenSheetButtons();
    ensureVisibleOpenSheetButton();
    const copy=$('btnCopyCloudScript'); if(copy)copy.addEventListener('click',copyScriptCode);
  }
  function start(){ensureCloudSaveUi();setTimeout(ensureCloudSaveUi,150);setTimeout(ensureCloudSaveUi,600);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);
  else start();
  window.ensureCloudSaveUi=ensureCloudSaveUi;
})();
</script>

<script id="lineReflectConfirmScript">
(function setupLineReflectConfirmModal(){
  function ready(fn){
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fn,{once:true});
    else fn();
  }
  function byId(id){return document.getElementById(id)}
  function text(value,fallback){
    value=(value==null?'':String(value)).trim();
    return value || (fallback||'未設定');
  }
  function maskToken(token){
    token=(token||'').trim();
    if(!token)return '未入力';
    if(token.length<=10)return '入力あり';
    return token.slice(0,6)+'…'+token.slice(-4);
  }
  function safeHtml(value){
    return String(value==null?'':value).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});
  }
  function getConfirmSnapshot(){
    var menu=(typeof currentMenu==='function')?currentMenu():null;
    var size=(typeof getCanvasSize==='function')?getCanvasSize():{w:2500,h:1686};
    var areas=menu&&Array.isArray(menu.areas)?menu.areas:[];
    var missingActions=areas.filter(function(a){return !(a&&a.action&&a.action.type&&String(a.action.value||'').trim());}).length;
    var token=(typeof getLineToken==='function')?getLineToken():((byId('lineTokenInput')&&byId('lineTokenInput').value)||'');
    var clientInput=byId('clientProjectNameInput');
    var fileInput=byId('projectFileName');
    var auto=byId('autoSetDefault');
    return {
      client:text(clientInput&&clientInput.value,'未設定'),
      file:text(fileInput&&fileInput.value,'未設定'),
      menu:text(menu&&menu.name,'未設定'),
      size:size.w+' × '+size.h+' px',
      image:menu&&menu.bgImageData?'設定済み':'未設定',
      areas:areas.length+'個',
      missing:missingActions+'個',
      token:maskToken(token),
      auto:auto&&auto.checked?'ON（反映後に全員表示）':'OFF（反映のみ）',
      richMenuId:menu&&menu.richMenuId?menu.richMenuId:'未取得'
    };
  }
  function ensureModal(){
    var existing=byId('lineReflectConfirmBackdrop');
    if(existing)return existing;
    var backdrop=document.createElement('div');
    backdrop.id='lineReflectConfirmBackdrop';
    backdrop.className='line-reflect-confirm-backdrop';
    backdrop.setAttribute('aria-hidden','true');
    backdrop.innerHTML=''+
      '<div class="line-reflect-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="lineReflectConfirmTitle">'+
        '<div class="line-reflect-confirm-head"><strong id="lineReflectConfirmTitle">LINEに反映する前の最終確認</strong><button type="button" class="line-reflect-confirm-close" id="lineReflectConfirmClose" aria-label="閉じる">×</button></div>'+ 
        '<div class="line-reflect-confirm-body">'+
          '<div class="line-reflect-confirm-note">この内容でLINE公式アカウントへ反映します。クライアント・トークン・未設定アクションを確認してから実行してください。</div>'+ 
          '<div class="line-reflect-confirm-grid" id="lineReflectConfirmGrid"></div>'+ 
          '<ul class="line-reflect-confirm-list">'+
            '<li>未設定アクションがあるエリアは、タップしても意図した動作にならない可能性があります。</li>'+ 
            '<li>個別リンク中のユーザーには、全員表示より個別リンク中のリッチメニューが優先されます。</li>'+ 
            '<li>不安な場合は、先にバックアップ保存を行ってください。</li>'+ 
          '</ul>'+ 
          '<div class="line-reflect-confirm-actions"><button type="button" class="btn" id="lineReflectConfirmCancel">キャンセル</button><button type="button" class="btn btn-primary" id="lineReflectConfirmRun">この内容でLINEに反映</button></div>'+ 
        '</div>'+ 
      '</div>';
    document.body.appendChild(backdrop);
    backdrop.addEventListener('click',function(e){if(e.target===backdrop)closeModal();});
    byId('lineReflectConfirmClose').addEventListener('click',closeModal);
    byId('lineReflectConfirmCancel').addEventListener('click',closeModal);
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&backdrop.classList.contains('open'))closeModal();});
    return backdrop;
  }
  function renderGrid(snapshot){
    var grid=byId('lineReflectConfirmGrid');
    if(!grid)return;
    var items=[
      ['クライアント名',snapshot.client,snapshot.client==='未設定'?'warning':''],
      ['保存ファイル名',snapshot.file,snapshot.file==='未設定'?'warning':''],
      ['反映するメニュー名',snapshot.menu,snapshot.menu==='未設定'?'warning':''],
      ['画像サイズ',snapshot.size,''],
      ['背景画像',snapshot.image,snapshot.image==='未設定'?'warning':''],
      ['エリア数',snapshot.areas,''],
      ['未設定アクション',snapshot.missing,snapshot.missing!=='0個'?'danger':''],
      ['チャネルアクセストークン',snapshot.token,snapshot.token==='未入力'?'danger':''],
      ['全員表示設定',snapshot.auto,''],
      ['現在のrichMenuId',snapshot.richMenuId,snapshot.richMenuId==='未取得'?'warning':'']
    ];
    grid.innerHTML=items.map(function(item){
      return '<div class="line-reflect-confirm-item"><span class="line-reflect-confirm-label">'+safeHtml(item[0])+'</span><span class="line-reflect-confirm-value '+item[2]+'">'+safeHtml(item[1])+'</span></div>';
    }).join('');
  }
  function closeModal(){
    var backdrop=byId('lineReflectConfirmBackdrop');
    if(!backdrop)return;
    backdrop.classList.remove('open');
    backdrop.setAttribute('aria-hidden','true');
    var run=byId('lineReflectConfirmRun');
    if(run)run.onclick=null;
  }
  function openModal(onRun){
    var backdrop=ensureModal();
    renderGrid(getConfirmSnapshot());
    backdrop.classList.add('open');
    backdrop.setAttribute('aria-hidden','false');
    var run=byId('lineReflectConfirmRun');
    if(run){
      run.onclick=function(){closeModal();if(typeof onRun==='function')onRun();};
      setTimeout(function(){run.focus();},30);
    }
  }
  function bind(){
    ['btnSetDefault'].forEach(function(id){
      var btn=byId(id);
      if(!btn || btn.dataset.lineReflectConfirmBound==='1')return;
      btn.dataset.lineReflectConfirmBound='1';
      btn.addEventListener('click',function(e){
        if(btn.dataset.skipLineReflectConfirm==='1'){
          delete btn.dataset.skipLineReflectConfirm;
          return;
        }
        e.preventDefault();
        e.stopImmediatePropagation();
        openModal(function(){
          btn.dataset.skipLineReflectConfirm='1';
          btn.click();
        });
      },true);
    });
  }
  ready(function(){bind();setTimeout(bind,200);setTimeout(bind,800);});
})();
</script>

<script id="masterBasicSettingsNoExpandScript">

<style id="masterSaveOnlyPatchStyle">
  .line-mini-note{white-space:pre-line!important;}
</style>
<script id="masterSaveOnlyPatchScript">
(function(){
  'use strict';
  function byId(id){return document.getElementById(id)}
  function saveOnly(){
    var btn=byId('btnApiUpload');
    if(!btn || btn.dataset.masterSaveOnlyApplied==='1')return;
    var clone=btn.cloneNode(true);
    clone.dataset.masterSaveOnlyApplied='1';
    clone.textContent='💾 お手軽保存';
    clone.title='このブラウザ内に作業データを保存します。LINEには反映しません。';
    btn.parentNode.replaceChild(clone,btn);
    clone.addEventListener('click',function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      try{
        if(typeof saveProjectToLocal==='function')saveProjectToLocal(true);
        if(typeof markProjectFileSaved==='function')markProjectFileSaved();
        if(typeof updateProjectSaveStatus==='function'){
          var time=(typeof formatSaveTime==='function')?formatSaveTime(new Date()):'';
          updateProjectSaveStatus('お手軽保存済み '+time,'saved');
        }
        if(typeof showToast==='function')showToast('保存しました','success');
      }catch(error){
        var msg=(error&&error.message)||'保存に失敗しました。';
        if(typeof showToast==='function')showToast(msg,'error');
        else alert(msg);
      }
    },true);
  }
  function updateSaveNote(){
    var mini=document.querySelector('.line-mini-note');
    if(mini){
      mini.style.whiteSpace='pre-line';
      mini.textContent='LINEに反映を押した後に確認されたい場合は、LINEアプリを落としてください。\nまれに、反映されるのに、数分お時間がかかる時があります。\nそれでも反映されない時は、LINE表示を停止を押し、リッチメニューが消えてるかを確認後、再度LINEに反映を押してください。';
    }
  }
  function run(){saveOnly();updateSaveNote();}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});
  else run();
  window.addEventListener('load',run,{once:true,passive:true});
  [100,300,800].forEach(function(ms){setTimeout(run,ms);});
})();
</script>
<!-- MASTER_SAVE_ONLY_PATCH_END -->



<!-- LOCAL_SAVE_RECOVERY_PATCH_START -->
<style id="localSaveRecoveryPatchStyle">
  .local-recovery-box{margin-top:10px;border:1px dashed var(--line);border-radius:8px;background:#fff;overflow:hidden;}
  .local-recovery-box>summary{padding:9px 10px;cursor:pointer;font-size:12px;font-weight:900;color:#374151;list-style:none;background:#fffdf7;}
  .local-recovery-box>summary::-webkit-details-marker{display:none;}
  .local-recovery-box>summary::before{content:'▶ ';color:#b45309;}
  .local-recovery-box[open]>summary::before{content:'▼ ';}
  .local-recovery-body{display:grid;gap:8px;padding:0 10px 10px;}
  .local-recovery-note{font-size:12px;line-height:1.55;color:#374151;background:#fffbeb;border-left:4px solid #f59e0b;border-radius:7px;padding:8px;}
  .local-recovery-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .local-recovery-actions button,.local-recovery-item button{min-height:32px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12px;font-weight:900;cursor:pointer;}
  .local-recovery-actions .primary,.local-recovery-item .primary{background:var(--brand);border-color:var(--brand);color:#fff;}
  .local-recovery-list{display:grid;gap:7px;max-height:220px;overflow:auto;}
  .local-recovery-item{border:1px solid var(--line-soft);border-radius:8px;background:#f8fafc;padding:8px;display:grid;gap:7px;}
  .local-recovery-title{font-size:12px;font-weight:900;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .local-recovery-meta{font-size:11px;font-weight:800;color:#64748b;line-height:1.45;}
  .local-recovery-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  @media(max-width:760px){.local-recovery-actions,.local-recovery-buttons{grid-template-columns:1fr;}}
</style>
<script id="localSaveRecoveryPatchScript">
(function(){
  'use strict';
  var LOCAL_PROJECT_KEY='richmenu_plus_project_autosave_v1';
  var LOCAL_PROJECT_CLIENT_INDEX_KEY='richmenu_plus_project_autosave_client_index_v1';
  function byId(id){return document.getElementById(id)}
  function toast(msg,type){if(typeof showToast==='function')showToast(msg,type||'');else alert(msg)}
  function parseJson(raw){try{return raw?JSON.parse(raw):null}catch(e){return null}}
  function fmt(iso){
    if(!iso)return '保存日時不明';
    var d=new Date(iso);if(isNaN(d.getTime()))return '保存日時不明';
    return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function decodeClientKeyName(key){
    var prefix=LOCAL_PROJECT_KEY+'::client::';
    if(String(key||'').indexOf(prefix)!==0)return '';
    try{return decodeURIComponent(String(key).slice(prefix.length))}catch(e){return String(key).slice(prefix.length)}
  }
  function projectLooksValid(data){return data && data.app==='richmenu-plus' && Array.isArray(data.menus) && data.menus.length}
  function collectLocalSaves(){
    var found=[];var seen={};
    function add(key,name,source){
      if(!key||seen[key])return;seen[key]=true;
      var raw='';try{raw=localStorage.getItem(key)||''}catch(e){}
      var data=parseJson(raw);if(!projectLooksValid(data))return;
      found.push({key:key,name:name||data.clientProjectName||data.projectName||decodeClientKeyName(key)||'ブラウザ保存データ',savedAt:data.savedAt||'',menus:Array.isArray(data.menus)?data.menus.length:0,images:Array.isArray(data.menus)?data.menus.filter(function(m){return m&&m.bgImageData}).length:0,source:source||'scan'});
    }
    try{
      var pointer=parseJson(localStorage.getItem(LOCAL_PROJECT_KEY)||'');
      if(pointer&&pointer.app==='richmenu-plus-autosave-pointer'&&pointer.key)add(pointer.key,pointer.name||'', '現在の保存先');
      else if(projectLooksValid(pointer)){
        found.push({key:LOCAL_PROJECT_KEY,name:pointer.clientProjectName||pointer.projectName||'旧お手軽保存',savedAt:pointer.savedAt||'',menus:pointer.menus.length,images:pointer.menus.filter(function(m){return m&&m.bgImageData}).length,source:'旧形式'});
        seen[LOCAL_PROJECT_KEY]=true;
      }
    }catch(e){}
    try{
      var idx=parseJson(localStorage.getItem(LOCAL_PROJECT_CLIENT_INDEX_KEY)||'[]');
      if(Array.isArray(idx))idx.forEach(function(item){if(item&&item.key)add(item.key,item.name||'', '保存管理一覧')});
    }catch(e){}
    try{
      for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i)||'';
        if(key.indexOf(LOCAL_PROJECT_KEY+'::client::')===0)add(key,decodeClientKeyName(key),'ブラウザ内検索');
      }
    }catch(e){}
    found.sort(function(a,b){return String(b.savedAt||'').localeCompare(String(a.savedAt||''))});
    return found;
  }
  function loadLocalSave(key){
    var raw='';try{raw=localStorage.getItem(key)||''}catch(e){}
    var data=parseJson(raw);
    if(!projectLooksValid(data)){toast('復旧できる保存データが見つかりません','error');return false;}
    if(typeof loadClientProjectFromStorage==='function' && key.indexOf(LOCAL_PROJECT_KEY+'::client::')===0){
      return loadClientProjectFromStorage(key);
    }
    if(typeof loadProjectData!=='function'){toast('読み込み処理が見つかりません','error');return false;}
    if(!confirm('現在の画面を、選択したブラウザ保存データで置き換えますか？'))return false;
    loadProjectData(data);
    if(typeof renderMenuTabs==='function')renderMenuTabs();
    if(typeof loadCurrentMenu==='function')loadCurrentMenu();
    if(typeof renderAreaList==='function')renderAreaList();
    if(typeof renderUserList==='function')renderUserList();
    if(typeof updateUploadBadge==='function')updateUploadBadge();
    if(typeof render==='function')render();
    setTimeout(function(){if(typeof fitZoom==='function')fitZoom();},100);
    toast('ブラウザ保存から復旧しました','success');
    return true;
  }
  function migrateLocalSave(key){
    if(!loadLocalSave(key))return;
    setTimeout(function(){
      var urlInput=byId('cloudSaveEndpointInput');
      if(!urlInput||!urlInput.value.trim()){toast('Apps Script URLを設定してからクラウド保存してください','error');return;}
      var btn=byId('btnCloudSave');
      if(btn){btn.click();toast('クラウド保存を開始しました','success');}
      else toast('クラウド保存ボタンが見つかりません','error');
    },700);
  }
  function renderList(){
    var list=byId('localRecoveryList');if(!list)return;
    var saves=collectLocalSaves();
    if(!saves.length){
      list.innerHTML='<div class="local-recovery-note">このURLのブラウザ内には、復旧できる保存データが見つかりませんでした。昨日と違うVercelのURLを開いている場合は、昨日使ったURLで開くか、保存済みのプロジェクトJSONを読み込んでください。</div>';
      return;
    }
    list.innerHTML=saves.map(function(item,idx){
      return '<div class="local-recovery-item" data-key="'+String(item.key).replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'">'+
        '<div class="local-recovery-title">'+String(item.name||'ブラウザ保存データ').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'+ 
        '<div class="local-recovery-meta">'+fmt(item.savedAt)+'｜メニュー '+item.menus+'件｜画像 '+item.images+'件｜'+item.source+'</div>'+ 
        '<div class="local-recovery-buttons"><button type="button" class="primary" data-act="open" data-i="'+idx+'">開く</button><button type="button" data-act="cloud" data-i="'+idx+'">クラウドへ移行</button></div>'+ 
      '</div>';
    }).join('');
    list.querySelectorAll('button[data-act]').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.preventDefault();e.stopPropagation();
        var item=saves[parseInt(btn.getAttribute('data-i'),10)];if(!item)return;
        if(btn.getAttribute('data-act')==='open')loadLocalSave(item.key);
        else migrateLocalSave(item.key);
      });
    });
  }
  function ensureUi(){
    var cloudBody=document.querySelector('#cloudSaveDetails .cloud-save-body')||document.querySelector('#projectClientMenuPanel .client-manager-body')||document.querySelector('.project-meta-card .project-meta-grid');
    if(!cloudBody||byId('localSaveRecoveryBox'))return;
    var details=document.createElement('details');
    details.id='localSaveRecoveryBox';
    details.className='local-recovery-box';
    details.innerHTML='<summary>🛟 昨日のお手軽保存を復旧・クラウド移行</summary>'+ 
      '<div class="local-recovery-body">'+
        '<div class="local-recovery-note">クラウド保存を追加しても、昨日のお手軽保存は自動ではクラウドに移りません。ここから同じURL内のブラウザ保存を開くか、クラウドへ移行できます。</div>'+ 
        '<div class="local-recovery-actions"><button type="button" id="btnLocalRecoveryRefresh" class="primary">保存データを探す</button><button type="button" id="btnLocalRecoveryOpenLatest">最新を開く</button></div>'+ 
        '<div id="localRecoveryList" class="local-recovery-list"></div>'+ 
      '</div>';
    cloudBody.appendChild(details);
    var refresh=byId('btnLocalRecoveryRefresh');if(refresh)refresh.addEventListener('click',function(e){e.preventDefault();renderList();});
    var latest=byId('btnLocalRecoveryOpenLatest');if(latest)latest.addEventListener('click',function(e){e.preventDefault();var saves=collectLocalSaves();if(!saves.length){renderList();return;}loadLocalSave(saves[0].key);});
    details.addEventListener('toggle',function(){if(details.open)renderList();});
    renderList();
  }
  function run(){ensureUi();}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true}); else run();
  window.addEventListener('load',run,{once:true,passive:true});
  [300,800,1500,3000].forEach(function(ms){setTimeout(run,ms);});
})();
</script>
<!-- LOCAL_SAVE_RECOVERY_PATCH_END -->

</body>

<html lang="ja">
<head>

<title>リッチメニュープラス</title>
<style>
:root{
  --brand:#06c755;
  --brand-dark:#05a84a;

  --shadow:0 6px 18px rgba(15,23,42,.08);

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;max-width:100vw;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.45}
button,input,select,textarea{font-family:inherit}button{cursor:pointer}.hidden{display:none!important}
.top-menu-row,.drawer-backdrop,.side-drawer,.below-canvas-grid,.reference-default-actions{display:none!important}

.login-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.42);z-index:2147483000;padding:20px}
.login-overlay.hidden{display:none!important}
.login-card{width:min(420px,92vw);background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(15,23,42,.28);padding:24px;border:1px solid var(--line)}
.login-card input{width:100%;height:42px;border:1px solid #d7dee7;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:15px}
.login-error{min-height:20px;margin-top:10px;color:var(--danger);font-size:13px;font-weight:800;line-height:1.5}

.header{height:var(--header-h);display:flex;align-items:center;justify-content:center;position:relative;z-index:100;background:var(--brand);color:#fff;padding:6px 14px;overflow:visible}
.header-title-wrap{position:absolute;left:14px;top:0;height:var(--header-h);min-width:220px;max-width:380px;display:flex;align-items:center}.header-title-row{height:auto;display:flex;align-items:center;gap:8px}.header h1{font-size:22px;font-weight:900;line-height:1;white-space:nowrap}

.header-actions{position:absolute;left:50%;top:7px;transform:translateX(56px);display:flex;gap:8px;z-index:4}.header-actions .btn{height:34px;min-width:72px;padding:0 12px;border:0;border-radius:7px;background:#fff;color:#263238;font-size:13px;font-weight:900;box-shadow:0 1px 0 rgba(0,0,0,.06)}
.main{width:100vw;height:calc(100vh - var(--header-h));display:grid;grid-template-columns:minmax(0,1fr) minmax(0,var(--right-w));gap:var(--right-gap);padding:var(--page-pad);overflow:hidden;align-items:start}
.left{min-width:0;width:100%;height:var(--work-h);display:grid;grid-template-rows:44px minmax(0,1fr);gap:10px;overflow:hidden;background:transparent}.menu-tabs{height:44px;display:flex;align-items:center;gap:8px;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;justify-content:flex-start;padding:0 4px 4px;background:#edf1f5;white-space:nowrap}.menu-tab,.menu-add{height:36px;display:flex;align-items:center;gap:8px;flex:0 0 auto;max-width:190px;padding:0 18px;border:1px solid var(--line);border-radius:5px;background:#fff;font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.menu-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}.menu-tab .close{font-weight:900;opacity:.75;padding-left:4px}.menu-add{border-style:dashed;color:var(--brand);background:#fff}
.canvas-wrap{height:100%;min-height:0;background:#fff;border:1px solid var(--line);border-radius:4px;box-shadow:0 2px 8px rgba(15,23,42,.04);padding:10px;display:flex;flex-direction:column;overflow:hidden}.canvas-info{height:34px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 8px;color:#536071;font-size:12px;flex:0 0 auto;min-width:0}.zoom-controls{display:flex;align-items:center;gap:6px;flex:0 0 auto}.zoom-controls button{width:30px;height:30px;border:1px solid var(--line);border-radius:4px;background:#fff;font-size:14px}.zoom-controls .zoom-val{min-width:46px;text-align:center;font-size:12px;font-weight:800}.upload-badge{display:inline-flex;align-items:center;justify-content:center;min-width:62px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}.upload-badge.new{background:#fff3cd;color:#856404}.upload-badge.uploaded{background:#d4edda;color:#155724}.upload-badge.modified{background:#f8d7da;color:#721c24}.canvas-scroll{flex:1;min-width:0;min-height:0;max-width:100%;overflow:auto;background:#f8fafc;border:1px solid var(--line);border-radius:4px;padding:12px 12px 12px 64px;display:flex;justify-content:flex-start;align-items:flex-start}.canvas-container{position:relative;display:inline-block;flex:0 0 auto}#canvas{display:block;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);cursor:crosshair}.canvas-grid-overlay{display:none!important}.upload-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,255,255,.86);border:2px dashed var(--brand);cursor:pointer;z-index:5}.upload-overlay.hidden{display:none}.upload-overlay-icon{font-size:34px}.upload-overlay-text{margin-top:6px;color:var(--brand);font-weight:800;text-align:center}
.right{width:var(--right-w);height:var(--work-h);min-width:0;overflow:visible;background:transparent}.right-top-card-row{width:100%;height:var(--work-h);display:grid;grid-template-columns:minmax(0,var(--right-area-w)) minmax(0,var(--right-side-w));grid-template-rows:var(--project-card-h) minmax(0,var(--right-tab-h));column-gap:var(--right-gap);row-gap:var(--right-card-gap-y);align-items:start;overflow:visible}.area-main-block{grid-column:1;grid-row:1 / span 2;width:100%;height:var(--work-h);min-height:0;max-height:var(--work-h);background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;display:flex;flex-direction:column;overflow:hidden}.project-meta-card{grid-column:2;grid-row:1;width:100%;height:var(--project-card-h);min-height:0;max-height:var(--project-card-h);background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 12px;display:flex;flex-direction:column;overflow:hidden}.right-tab-card{grid-column:2;grid-row:2;width:100%;height:var(--right-tab-h);min-height:0;max-height:var(--right-tab-h);display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.area-main-head{height:38px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;flex:0 0 auto;border-bottom:1px solid var(--line-soft);padding-bottom:8px;margin-bottom:8px}.area-main-head h3{font-size:16px;font-weight:900;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.btn-add-area{height:34px;min-width:112px;padding:0 14px;border:0;border-radius:6px;background:var(--brand);color:#fff;font-size:13px;font-weight:900}#panel-areas{display:block!important;flex:1;min-height:0;overflow:hidden;padding:0}.area-list{height:100%;min-height:0;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;padding:0 4px 8px 0;scrollbar-gutter:stable}.area-card{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:6px;overflow:visible;min-width:0}.area-card.selected{box-shadow:0 0 0 2px rgba(6,199,85,.22)}.area-header{min-height:44px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;background:#fafbfc;cursor:pointer;min-width:0}.area-header-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}.area-header-left strong{font-size:13px;font-weight:900;max-width:92px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.toggle-icon{font-size:12px;flex:0 0 auto}.area-card.expanded .toggle-icon{transform:rotate(90deg)}.status-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}.status-dot.on{background:var(--brand)}.status-dot.off{background:#b9c0c8}.meta-text{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px}.area-body{display:none;padding:12px;border-top:1px solid var(--line-soft);background:#fff}.area-card.expanded .area-body{display:block}.area-body .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.area-body .form-group{margin-bottom:9px}.area-body label,.form-group label{display:block;margin-bottom:5px;font-size:12px;font-weight:900;color:#374151;line-height:1.35}.form-group input,.form-group select,.form-group textarea{width:100%;min-height:34px;border:1px solid #d7dee7;border-radius:5px;background:#fff;padding:7px 9px;font-size:13px;line-height:1.35}.form-group textarea{min-height:58px;resize:vertical}.area-body .btn-danger{width:100%;height:34px;border:0;border-radius:5px;background:var(--danger);color:#fff;font-size:13px;font-weight:900;line-height:1.2}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--brand)}
.project-meta-card h3{font-size:15px;font-weight:900;margin:0 0 6px}.project-meta-grid{display:grid;grid-template-columns:1fr;gap:7px;min-height:0}.project-meta-card .form-group{margin:0}.project-meta-card label{font-size:12px;font-weight:900;margin-bottom:4px}.project-meta-card input{height:36px;min-height:36px;font-size:13px;padding:7px 10px}.project-meta-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center;margin-top:8px;min-width:0}.client-add-main-btn{height:34px;display:flex;align-items:center;justify-content:center;width:100%;min-width:0;border-radius:6px;font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.client-add-area{min-width:0}.client-add-main-btn{background:#fff;color:var(--brand-dark);border:1px dashed var(--brand)}.client-add-panel{display:none;grid-column:1 / -1;margin-top:8px;padding:10px;border:1px dashed var(--brand);border-radius:6px;background:#fafffc}.client-add-panel.open{display:block;position:absolute;z-index:10;right:12px;top:calc(var(--project-final-h) - 4px);width:calc(var(--right-side-w) - 24px);box-shadow:var(--shadow)}
.right-tabs{height:44px;display:grid;grid-template-columns:repeat(3,1fr);flex:0 0 auto;background:#f8fafc;border-bottom:1px solid var(--line)}.right-tab-btn{border:0;border-right:1px solid var(--line);background:#f8fafc;color:#374151;font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.right-tab-btn:last-child{border-right:0}.right-tab-btn.active{background:var(--brand);color:#fff}.right-tab-body{flex:1;min-height:0;overflow:auto;padding:12px}.right-tab-pane{display:none}.right-tab-pane.active{display:block}.right-tab-pane h3{font-size:15px;margin:0 0 10px;font-weight:900}.right-primary-action{height:42px;width:100%;border:0;border-radius:5px;background:var(--brand);color:#fff;font-weight:900}.line-mini-note{margin:12px 0;padding:10px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;color:#64748b;font-size:12px;line-height:1.65}.button-row,.api-actions,.default-button-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.btn{min-height:34px;padding:7px 12px;border:1px solid var(--line);border-radius:5px;background:#fff;color:#111827;font-size:13px;font-weight:800;white-space:nowrap}.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}.btn-block{width:100%}.token-guide{margin-top:10px;padding:10px;border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:6px;background:#f8fafc;color:#374151;font-size:12px;line-height:1.65;max-height:160px;overflow:auto}.user-add-row{display:grid;gap:8px;padding:10px;border:1px dashed var(--brand);border-radius:6px;background:#fff}.user-list{display:grid;gap:8px;margin-top:10px}.user-item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:6px;background:#f8fafc}.user-item .name{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.user-item .uid{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.user-empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}
.ctx-menu{position:fixed;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 10px 28px rgba(0,0,0,.18);z-index:1000;min-width:180px;display:none}.ctx-menu.show{display:block}.ctx-menu-item{padding:11px 14px;cursor:pointer;font-size:13px}.ctx-menu-item:hover{background:#f8fafc}.ctx-menu-item.danger{color:var(--danger)}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 22px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:2147483500;font-size:13px}.toast.show{opacity:1}.toast.success{background:var(--brand)}.toast.error{background:var(--danger)}


.save-quick-action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 10px}.save-quick-action-row .btn{width:100%;min-width:0;white-space:nowrap}
@media(max-width:1200px){:root{--right-area-w:292px;--right-side-w:360px}.canvas-scroll{padding-left:32px}}
@media(max-width:760px){html,body{overflow:auto}.header{position:sticky;top:0}.header-file-actions,.header-actions,.main{display:block;height:auto;min-height:100vh;overflow-x:hidden;overflow-y:auto;padding:10px}.left{height:58vh;min-height:420px;overflow:hidden}.canvas-scroll{padding-left:12px}.right{width:100%;height:auto;margin-top:12px;overflow:visible}.right-top-card-row{width:100%;height:auto;display:grid;grid-template-columns:1fr;grid-template-rows:auto auto auto;transform:none}.area-main-block,.project-meta-card,.right-tab-card{grid-column:1!important;grid-row:auto!important;width:100%;max-width:100%}.area-main-block{height:420px;max-height:420px}.project-meta-card{height:auto;max-height:none}.right-tab-card{height:460px;max-height:460px}.client-add-panel.open{position:static;width:auto}}


.project-meta-card{position:relative;overflow:visible;z-index:20;}
.project-meta-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 6px;position:relative;}
.project-meta-head h3{margin:0!important;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-client-management-area{display:block;position:relative;margin:2px 0 0;border:0;border-radius:8px;background:#fff;overflow:visible;}
.project-client-management-summary{list-style:none;min-height:36px;display:flex;align-items:center;gap:8px;padding:0 10px;color:#064e3b;font-size:12px;font-weight:900;cursor:pointer;user-select:none;background:#f0fdf4;border:1px solid rgba(6,199,85,.35);border-radius:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.project-client-management-summary::-webkit-details-marker{display:none;}
.project-client-management-summary::before{content:'▶';font-size:10px;color:var(--brand-dark);transition:transform .15s ease;}
.project-client-management-area[open] .project-client-management-summary::before{transform:rotate(90deg);}
.project-client-management-area[open] .project-client-management-summary{background:#ecfdf5;border-bottom:1px solid var(--line-soft);border-radius:8px 8px 0 0;}
.project-client-menu-panel{display:none;position:relative;width:100%;max-height:min(520px,calc(var(--work-h) - 150px));overflow:auto;background:#fff;border-radius:0 0 8px 8px;z-index:2000;}
.project-client-management-area[open]>.project-client-menu-panel{display:block;}

.project-info-autosave-group{display:flex!important;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border:1px solid var(--line-soft);border-radius:6px;background:#f8fafc;}
.project-info-autosave-group label{margin:0!important;font-size:12px!important;font-weight:900!important;color:#374151!important;}
.project-info-autosave-switch{display:flex!important;align-items:center!important;gap:8px!important;cursor:pointer;user-select:none;}
.project-info-autosave-switch input{width:auto!important;height:auto!important;min-height:0!important;padding:0!important;}
.project-info-autosave-help{font-size:11px;font-weight:800;color:#64748b;line-height:1.35;}

.project-save-status{
  margin-top:7px;
  padding:6px 8px;
  border:1px solid var(--line-soft);
  border-radius:6px;
  background:#f8fafc;
  color:#64748b;
  font-size:11px;
  font-weight:900;
  line-height:1.25;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.project-save-status[data-state="dirty"]{background:#fff7ed;color:#9a3412;border-color:#fed7aa;}
.project-save-status[data-state="saved"]{background:#ecfdf5;color:#047857;border-color:#bbf7d0;}
.project-save-status[data-state="error"]{background:#fef2f2;color:#b91c1c;border-color:#fecaca;}
</style>

<body>
<div id="loginOverlay" class="login-overlay"><div class="login-card"><p style="font-size:18px;font-weight:700;color:#111;margin-bottom:14px;">パスワードを入力してください</p><input type="password" id="appPasswordInput" placeholder="パスワード" autocomplete="current-password"><button class="btn btn-primary btn-block" id="btnLogin">ログイン</button><div class="login-error" id="loginMsg"></div></div></div>
<div class="header"><div class="header-title-wrap"><div class="header-title-row"><h1>🎨 リッチメニュープラス</h1></div></div><div class="header-actions"><button class="btn btn-sm" id="btnUndo">↶ 戻す</button><button class="btn btn-sm" id="btnRedo">↷ 進む</button><button class="btn btn-sm logout-mini" id="btnLogout">ログアウト</button></div></div>
<div class="top-menu-row"><button class="menu-icon-btn" id="btnSideMenu" title="メニュー">☰</button><span style="font-size:14px;color:#555;">メニュー</span></div>
<div class="drawer-backdrop" id="drawerBackdrop"></div><div class="side-drawer" id="sideDrawer"><div class="drawer-head"><strong>メニュー</strong><button class="btn btn-sm" id="btnCloseDrawer">閉じる</button></div><div class="drawer-body"><div class="drawer-section" id="drawer-status-section"><h3>反映状態確認</h3>
<div class="form-group"><label>確認用ユーザーID（自分のUから始まるID）</label><input type="text" id="statusUserId" placeholder="例: U1234567890abcdef..."></div>
<div class="button-row">
<button class="btn btn-sm" id="btnCheckDefault">🔎 現在のデフォルトrichMenuId確認</button>
<button class="btn btn-sm" id="btnCheckUserRichMenu">👤 自分に個別リンク中のrichMenuId確認</button>
</div>
<div class="button-row">
<button class="btn btn-sm btn-primary" id="btnCheckReflectStatus">🧭 デフォルト＋個別リンクをまとめて確認</button>
</div></div><div class="panel drawer-section" id="panel-users"><h3>👤 ユーザーリンク</h3><div class="user-add-row"><div class="form-group" style="margin:0;"><label>ユーザー名（表示用）</label><input type="text" id="newUserName" placeholder="例: 山田 太郎"></div><div class="form-group" style="margin:0;"><label>ユーザーID</label><input type="text" id="newUserId" placeholder="例: U1234567890abcdef..."></div><button class="btn btn-primary btn-sm btn-block" id="btnAddUser">＋ 追加</button></div>
<h3 style="margin-top:18px;">登録ユーザー <span id="userCount" style="color:#888;font-size:14px;font-weight:normal;"></span></h3><div class="user-list" id="userListContainer"></div>
<h3 style="margin-top:18px;">適用 / 解除</h3><button class="btn btn-primary btn-sm btn-block" id="btnLinkUsers">🔗 登録ユーザー全員にリンク</button><button class="btn btn-sm btn-block" id="btnUnlinkUsers" style="margin-top:8px;">🔓 全員のリンクを解除</button></div></div></div>
<div class="main">
<div class="left"><div class="menu-tabs" id="menuTabs"></div>
<div class="canvas-wrap"><div class="canvas-info"><span id="sizeInfo">2500 × 1686 px</span><span class="upload-badge new" id="uploadStatus">未反映</span></div>
<div class="canvas-scroll" id="canvasScroll"><div class="canvas-container"><canvas id="canvas" width="2500" height="1686"></canvas><div id="canvasGridOverlay" class="canvas-grid-overlay hidden"></div><div class="upload-overlay" id="uploadOverlay"><div class="upload-overlay-icon">📷</div><div class="upload-overlay-text">クリックまたはドラッグで画像をアップロード</div><input type="file" id="fileInput" accept="image/*" style="display:none;"></div></div></div></div>

(function setupSafeWebStorage(){
  function makeMemoryStorage(){
    const data=Object.create(null);
    return {
      getItem:key=>Object.prototype.hasOwnProperty.call(data,key)?data[key]:null,
      setItem:(key,value)=>{data[key]=String(value)},
      removeItem:key=>{delete data[key]},
      clear:()=>{Object.keys(data).forEach(key=>delete data[key])},
      key:index=>Object.keys(data)[index]||null,
      get length(){return Object.keys(data).length}
    };
  }
  function ensureStorage(name){
    try{
      const storage=window[name];
      const test='__richmenu_storage_test__';
      storage.setItem(test,'1');
      storage.removeItem(test);
    }catch(e){
      try{Object.defineProperty(window,name,{value:makeMemoryStorage(),configurable:true});}
      catch(_){window['__'+name+'Fallback']=makeMemoryStorage();}
    }
  }
  ensureStorage('localStorage');
  ensureStorage('sessionStorage');
})();

function createMenu(name){
  const n=name||'メニュー'+(menus.length+1);
  const m={id:uid('m'),name:n,alias:'menu-'+(menus.length+1),chatBarText:'メニュー',size:'large',bgColor:'#ffffff',selected:true,bgImage:null,bgImageData:null,areas:[],users:[],uploadStatus:'new',richMenuId:null,isDefault:false};
  menus.push(m);currentMenuId=m.id;
  renderMenuTabs();loadCurrentMenu();saveHistory()
}
function deleteMenu(id){
  if(menus.length<=1){showToast('最低1つは必要です','error');return}
  if(!confirmDanger('このメニューを削除します。削除すると元に戻せません。実行しますか？'))return;
  const idx=menus.findIndex(m=>m.id===id);
  menus.splice(idx,1);
  currentMenuId=menus[Math.max(0,idx-1)].id;
  renderMenuTabs();loadCurrentMenu();saveHistory()
}
function renderMenuTabs(){
  const tabs=$('menuTabs');tabs.innerHTML='';
  menus.forEach(m=>{
    const el=document.createElement('div');
    el.className='menu-tab'+(m.id===currentMenuId?' active':'');
    el.innerHTML=`<span>${escapeHtml(m.name)}</span><span class="close" data-del="${m.id}">×</span>`;
    el.addEventListener('click',e=>{
      if(e.target.dataset.del){deleteMenu(m.id);return}
      currentMenuId=m.id;renderMenuTabs();loadCurrentMenu()
    });
    tabs.appendChild(el)
  });
  const add=document.createElement('div');
  add.className='menu-add';add.textContent='+ 追加';
  add.addEventListener('click',()=>createMenu());
  tabs.appendChild(add)
}
function loadCurrentMenu(){
  const m=currentMenu();if(!m)return;
  suppressRender=true;
  $('menuName').value=m.name;
  $('menuAlias').value=m.alias;
  $('chatBarText').value=m.chatBarText;
  $('menuSize').value=m.size;
  $('bgColor').value=m.bgColor;
  $('menuSelected').checked=m.selected!==false;
  suppressRender=false;
  applyCanvasSize();
  if(m.bgImageData&&!m.bgImage){
    const img=new Image();
    img.onload=()=>{m.bgImage=img;updateOverlay();render()};
    img.src=m.bgImageData
  }else{
    updateOverlay();render()
  }
  renderAreaList();renderUserList();updateUploadBadge()
}
function applyCanvasSize(){
  const{w,h}=getCanvasSize();
  canvas.width=w;canvas.height=h;
  applyZoom();
  $('sizeInfo').textContent=`${w} × ${h} px`
}
function applyZoom(){
  const{w,h}=getCanvasSize();
  canvas.style.width=(w*zoom)+'px';
  canvas.style.height=(h*zoom)+'px';
  if($('zoomVal'))$('zoomVal').textContent=Math.round(zoom*100)+'%';
  renderGridOverlay();
}
function renderGridOverlay(){
  const overlay=$('canvasGridOverlay');
  if(!overlay)return;
  const cb=$('showGridGuide');
  overlay.classList.toggle('hidden', cb && !cb.checked);
  overlay.innerHTML='';
  const{w,h}=getCanvasSize();
  overlay.style.width=(w*zoom)+'px';
  overlay.style.height=(h*zoom)+'px';
  const addLine=(type,pos,label)=>{
    const line=document.createElement('div');
    line.className='canvas-grid-line '+type;
    if(type==='v')line.style.left=(pos*zoom)+'px';
    else line.style.top=(pos*zoom)+'px';
    overlay.appendChild(line);
    const lab=document.createElement('div');
    lab.className='canvas-grid-label';
    lab.textContent=label;
    if(type==='v'){lab.style.left=Math.min(pos*zoom+4,w*zoom-64)+'px';lab.style.top='4px';}
    else{lab.style.left='4px';lab.style.top=Math.min(pos*zoom+4,h*zoom-20)+'px';}
    overlay.appendChild(lab);
  };
  for(let x=0;x<=w;x+=1000)addLine('v',x,x+'px');
  if(w%1000!==0)addLine('v',w,w+'px');
  for(let y=0;y<=h;y+=1000)addLine('h',y,y+'px');
  if(h%1000!==0)addLine('h',h,h+'px');
}
function fitZoom(){
  zoom=0.26;

function validateImageFile(file,img){
  const errors=[];
  const allowed=['image/jpeg','image/png'];
  const ratio=img.width/img.height;
  if(!allowed.includes(file.type))errors.push('フォーマットはJPEGまたはPNGにしてください');
  if(file.size>1024*1024)errors.push('ファイルサイズは1MB以内にしてください');
  if(img.width<2500||img.height<843)errors.push('画像サイズは2500px × 843px以上にしてください');
  if(img.width>2500||img.height>1686)errors.push('画像サイズは2500px × 1686px以内にしてください');
  if(ratio<1.45)errors.push('画像アスペクト比（幅÷高さ）は1.45以上にしてください');
  return errors;
}
function loadImage(file){
  clearHeaderStatus();
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const errors=validateImageFile(file,img);
      if(errors.length){
        const msg='画像エラー：'+errors.join(' / ');
        setHeaderStatus(msg,'error');
        showToast(msg,'error');
        return;
      }
      const{w,h}=getCanvasSize();
      if(img.width!==w||img.height!==h){
        setHeaderStatus(`注意：${img.width}×${img.height}です。LINE条件は満たしていますが、現在のキャンバス推奨は${w}×${h}です。`);
        showToast(`⚠️ ${img.width}×${img.height} (推奨 ${w}×${h})`,'error')
      }else{
        clearHeaderStatus();
        showToast('画像を読み込みました','success')
      }
      const m=currentMenu();
      m.bgImage=img;m.bgImageData=ev.target.result;
      markModified();updateOverlay();render();saveHistory()
    };
    img.onerror=()=>{const msg='画像を読み込めませんでした。JPEGまたはPNGを使用してください。';setHeaderStatus(msg,'error');showToast(msg,'error')};
    img.src=ev.target.result
  };
  reader.readAsDataURL(file)
}

function switchTab(name){

function renderAreaList(){
  const box=$('areaListContainer');
  const m=currentMenu();
  if(!m||m.areas.length===0){
    box.innerHTML='<div class="area-empty-help">エリアなし<br><small>キャンバスでドラッグ、または「＋ エリア追加」から作成できます。</small></div>';
    return
  }
  box.innerHTML='';
  m.areas.forEach(a=>{
    if(!a.action)a.action={type:'',value:''};
    if(!a.label)a.label='エリア';
    const card=document.createElement('div');
    card.dataset.areaId=a.id;
    card.className='area-card'+(a.id===selectedAreaId?' selected':'')+(expandedAreaIds.has(a.id)?' expanded':'');
    card.style.borderLeftColor=a.color;
    const header=document.createElement('div');
    header.className='area-header';
    header.innerHTML=`<div class="area-header-left"><span class="toggle-icon">▶</span><span class="status-dot ${a.action&&a.action.type?'on':'off'}"></span><strong>${escapeHtml(a.label)}</strong><span class="meta-text">${a.w}×${a.h}</span></div><span class="meta-text">${a.action&&a.action.type?a.action.type:'未設定'}</span>`;
    header.addEventListener('click',()=>{
      const wasExpanded=expandedAreaIds.has(a.id);
      if(wasExpanded)expandedAreaIds.delete(a.id);
      else expandedAreaIds.add(a.id);
      selectedAreaId=a.id;
      renderAreaList();render();
      if(!wasExpanded){
        setTimeout(()=>{
          const card=document.querySelector(`[data-area-id="${a.id}"]`);
          if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});
        },30);
      }
    });
    const body=document.createElement('div');
    body.className='area-body';
    body.innerHTML=`<div class="form-group"><label>ラベル</label><input type="text" data-f="label" value="${escapeHtml(a.label)}"></div><div class="form-row"><div class="form-group"><label>X</label><input type="number" data-f="x" value="${a.x}"></div><div class="form-group"><label>Y</label><input type="number" data-f="y" value="${a.y}"></div></div><div class="form-row"><div class="form-group"><label>幅</label><input type="number" data-f="w" value="${a.w}"></div><div class="form-group"><label>高さ</label><input type="number" data-f="h" value="${a.h}"></div></div><div class="form-group"><label>アクションタイプ</label><select data-f="actType"><option value="">なし</option><option value="uri" ${a.action.type==='uri'?'selected':''}>URI (URL)</option><option value="message" ${a.action.type==='message'?'selected':''}>メッセージ</option><option value="postback" ${a.action.type==='postback'?'selected':''}>Postback</option><option value="richmenuswitch" ${a.action.type==='richmenuswitch'?'selected':''}>リッチメニュー切替</option></select></div><div class="form-group" style="${a.action.type?'':'display:none;'}"><label>${getActionLabel(a.action.type)}</label>${renderActionValue(a)}</div><button class="btn btn-danger btn-sm btn-block" data-act="delete">🗑 エリアを削除</button>`;
    body.querySelectorAll('input, select, textarea').forEach(input=>{
      input.addEventListener('change',()=>{
        const f=input.dataset.f;if(!f)return;
        if(f==='actType'){a.action.type=input.value;a.action.value='';renderAreaList()}
        else if(f==='actValue'){a.action.value=input.value}
        else if(['x','y','w','h'].includes(f)){
          const newVal=parseInt(input.value)||0;
          const test={x:a.x,y:a.y,w:a.w,h:a.h};
          test[f]=newVal;
          if(test.w<20)test.w=20;
          if(test.h<20)test.h=20;
          if(test.x<0)test.x=0;
          if(test.y<0)test.y=0;
          if(test.x+test.w>canvas.width)test.x=canvas.width-test.w;
          if(test.y+test.h>canvas.height)test.y=canvas.height-test.h;
          // 端がぴったり接する状態はOK。実際に重なる場合だけ変更を止めます。
          if(conflictsWithOthers(test,a.id)){
            showToast('他のエリアと重なるため変更できません','error');
            input.value=a[f];
            return;
          }
          Object.assign(a,test);
          input.value=a[f]
        }else{a[f]=input.value}
        markModified();render();saveHistory()
      })
    });
    body.querySelector('[data-act="delete"]').addEventListener('click',()=>{
      if(!confirmDanger('このエリアを削除します。削除すると元に戻せません。実行しますか？'))return;
      m.areas=m.areas.filter(x=>x.id!==a.id);
      expandedAreaIds.delete(a.id);
      if(selectedAreaId===a.id)selectedAreaId=null;
      markModified();saveHistory();renderAreaList();render()
    });
    card.appendChild(header);card.appendChild(body);box.appendChild(card)
  })
}
function getActionLabel(type){return{uri:'URL',message:'メッセージ',postback:'Postback',richmenuswitch:'切替先エイリアス'}[type]||'値'}
function renderActionValue(a){
  const type=a.action.type;
  if(type==='richmenuswitch'){
    const opts=menus.filter(m=>m.id!==currentMenuId).map(m=>`<option value="${escapeHtml(m.alias)}" ${a.action.value===m.alias?'selected':''}>${escapeHtml(m.name)} (${escapeHtml(m.alias)})</option>`).join('');
    return`<select data-f="actValue"><option value="">選択...</option>${opts}</select>`
  }
  if(type==='uri')return`<input type="url" data-f="actValue" value="${escapeHtml(a.action.value)}" placeholder="https://...">`;
  if(type)return`<textarea data-f="actValue" rows="2">${escapeHtml(a.action.value)}</textarea>`;
  return''
}

function ensureIndividualLinkHistory(menu){
  const m=menu||currentMenu();
  if(!m)return [];

function latestIndividualLinkRecord(userId,menu){

}
function individualLinkRecordTime(value){

  const mo=String(d.getMonth()+1).padStart(2,'0');

  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  return `${y}/${mo}/${da} ${hh}:${mm}`;
}

function recordIndividualLinkOperation(status,options={}){

}
function normRect(p1,p2){return{x:Math.min(p1.x,p2.x),y:Math.min(p1.y,p2.y),w:Math.abs(p2.x-p1.x),h:Math.abs(p2.y-p1.y)}}
function getCanvasPos(e){

}
function hitArea(p){

    const a=m.areas[i];
    if(p.x>=a.x&&p.x<=a.x+a.w&&p.y>=a.y&&p.y<=a.y+a.h)return a

}
function hitHandle(p,a){

  }

function rectsOverlap(r1,r2){
  return !(r1.x+r1.w<=r2.x||r2.x+r2.w<=r1.x||r1.y+r1.h<=r2.y||r2.y+r2.h<=r1.y)
}
function conflictsWithOthers(r,excludeId){
  const m=currentMenu();if(!m)return false;
  return m.areas.some(a=>a.id!==excludeId&&rectsOverlap(a,r))
}
function intervalsOverlapStrict(a1,a2,b1,b2){
  return a1<b2 && b1<a2
}
function resolveTightAreaMove(area,nx,ny){
  const m=currentMenu();
  if(!m)return {x:nx,y:ny,w:area.w,h:area.h};

  // エリア移動は「ぶつかったら止まる」を優先します。
  // 障害物に当たったあと、マウスを横・斜めへ押し込んでも境界沿いに滑らないよう、
  // 最後に安全だった位置と、ぶつかった方向を保持します。
  const makeRect=(x,y)=>({
    x:Math.max(0,Math.min(canvas.width-area.w,Math.round(x))),
    y:Math.max(0,Math.min(canvas.height-area.h,Math.round(y))),
    w:area.w,
    h:area.h
  });
  const collides=rect=>conflictsWithOthers(rect,area.id);

  if(!dragMoveState || dragMoveState.areaId!==area.id){
    dragMoveState={
      areaId:area.id,
      lastSafe:makeRect(area.x,area.y),
      blocked:false,
      blockVector:null
    };
  }

  const currentSafe=makeRect(dragMoveState.lastSafe.x,dragMoveState.lastSafe.y);
  const target=makeRect(nx,ny);

  if(collides(currentSafe)){
    dragMoveState.lastSafe=makeRect(area.x,area.y);
    dragMoveState.blocked=true;
    dragMoveState.blockVector=null;
    return dragMoveState.lastSafe;
  }

  const rectAt=(from,to,t)=>makeRect(
    from.x+(to.x-from.x)*t,
    from.y+(to.y-from.y)*t
  );
  const movementVector=(from,to)=>({dx:to.x-from.x,dy:to.y-from.y});
  const rememberBlock=(from,to)=>{
    const v=movementVector(from,to);
    if(v.dx!==0||v.dy!==0)dragMoveState.blockVector=v;
    dragMoveState.blocked=true;
  };
  const isStillPushingIntoBlock=(from,to)=>{
    if(!dragMoveState.blocked||!dragMoveState.blockVector)return false;
    const v=movementVector(from,to);
    if(v.dx===0&&v.dy===0)return true;
    const b=dragMoveState.blockVector;
    // ぶつかった方向と同じ向き、または横方向に押し込んでいる間は固定します。
    // 一度、反対方向へ戻した時だけブロックを解除します。
    return (v.dx*b.dx + v.dy*b.dy) >= 0;
  };
  const findFirstCollision=(from,to)=>{
    const dx=to.x-from.x;
    const dy=to.y-from.y;
    const distance=Math.max(Math.abs(dx),Math.abs(dy));
    if(distance<1)return null;
    const steps=Math.max(1,Math.ceil(distance/3));
    let prevT=0;
    for(let i=1;i<=steps;i++){
      const t=i/steps;
      const test=rectAt(from,to,t);
      if(collides(test))return {safeT:prevT,hitT:t};
      prevT=t;
    }
    return null;
  };
  const safeBoundaryBeforeHit=(from,to,range)=>{
    let lo=range.safeT;
    let hi=range.hitT;
    for(let i=0;i<26;i++){
      const mid=(lo+hi)/2;
      const test=rectAt(from,to,mid);
      if(collides(test))hi=mid;
      else lo=mid;
    }
    for(let i=0;i<=12;i++){
      const t=Math.max(0,lo-(i/Math.max(1,Math.max(Math.abs(to.x-from.x),Math.abs(to.y-from.y))*3)));
      const safe=rectAt(from,to,t);
      if(!collides(safe))return safe;
    }
    return from;
  };

  if(isStillPushingIntoBlock(currentSafe,target))return currentSafe;
  if(dragMoveState.blocked){
    // 反対方向に戻したので、再び通常判定に戻します。
    dragMoveState.blocked=false;
    dragMoveState.blockVector=null;
  }

  if(collides(target)){
    const hit=findFirstCollision(currentSafe,target);
    const safe=hit?safeBoundaryBeforeHit(currentSafe,target,hit):currentSafe;
    dragMoveState.lastSafe=safe;
    rememberBlock(safe,target);
    return safe;
  }

  const hit=findFirstCollision(currentSafe,target);
  if(hit){
    const safe=safeBoundaryBeforeHit(currentSafe,target,hit);
    dragMoveState.lastSafe=safe;
    rememberBlock(safe,target);
    return safe;
  }

  dragMoveState.lastSafe=target;
  dragMoveState.blocked=false;
  dragMoveState.blockVector=null;
  return target;
}
function clampDrawRect(start,p){
  const m=currentMenu();
  let px=Math.max(0,Math.min(canvas.width,p.x));
  let py=Math.max(0,Math.min(canvas.height,p.y));
  const dx=px>=start.x?1:-1;
  const dy=py>=start.y?1:-1;
  if(m){
    for(const a of m.areas){
      const ax1=a.x,ax2=a.x+a.w,ay1=a.y,ay2=a.y+a.h;
      const yMin=Math.min(start.y,py),yMax=Math.max(start.y,py);
      if(!(yMax<=ay1||yMin>=ay2)){
        if(dx>0 && ax1>=start.x && ax1<px)px=ax1;
        else if(dx<0 && ax2<=start.x && ax2>px)px=ax2;
      }
      const xMin=Math.min(start.x,px),xMax=Math.max(start.x,px);
      if(!(xMax<=ax1||xMin>=ax2)){
        if(dy>0 && ay1>=start.y && ay1<py)py=ay1;
        else if(dy<0 && ay2<=start.y && ay2>py)py=ay2;
      }
    }
  }
  return{x:px,y:py}
}

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const p=getCanvasPos(e);
  const m=currentMenu();if(!m)return;
  hideCtxMenu();
  if(selectedAreaId){
    const sel=m.areas.find(a=>a.id===selectedAreaId);
    if(sel){
      const hn=hitHandle(p,sel);
      if(hn){mode='resizing';resizeHandle=hn;dragOriginal={...sel};drawStart=p;return}
    }
  }
  const a=hitArea(p);
  if(a){
    selectedAreaId=a.id;mode='dragging';
    dragOffset={x:p.x-a.x,y:p.y-a.y};
    dragOriginal={...a};
    dragMoveState={areaId:a.id,lastSafe:{x:a.x,y:a.y,w:a.w,h:a.h},blocked:false,blockVector:null};
    renderAreaList();render()
  }else{
    selectedAreaId=null;mode='drawing';
    drawStart=p;drawCurrent=p;
    renderAreaList();render()
  }
});
canvas.addEventListener('mousemove',e=>{
  const p=getCanvasPos(e);
  const m=currentMenu();if(!m)return;
  if(mode==='drawing'){
    drawCurrent=clampDrawRect(drawStart,p);
    render()
  }else if(mode==='dragging'){
    const a=m.areas.find(x=>x.id===selectedAreaId);
    if(a){
      const nx=Math.max(0,Math.min(canvas.width-a.w,Math.round(p.x-dragOffset.x)));
      const ny=Math.max(0,Math.min(canvas.height-a.h,Math.round(p.y-dragOffset.y)));
      const next=resolveTightAreaMove(a,nx,ny);
      a.x=next.x;a.y=next.y;render()
    }
  }else if(mode==='resizing'){
    const a=m.areas.find(x=>x.id===selectedAreaId);
    if(a&&dragOriginal){
      const o=dragOriginal;
      let nx=o.x,ny=o.y,nw=o.w,nh=o.h;
      if(resizeHandle.includes('e'))nw=Math.max(20,Math.round(p.x-o.x));
      if(resizeHandle.includes('s'))nh=Math.max(20,Math.round(p.y-o.y));
      if(resizeHandle.includes('w')){nx=Math.min(o.x+o.w-20,Math.round(p.x));nw=o.w+(o.x-nx)}
      if(resizeHandle.includes('n')){ny=Math.min(o.y+o.h-20,Math.round(p.y));nh=o.h+(o.y-ny)}
      nx=Math.max(0,nx);ny=Math.max(0,ny);
      nw=Math.min(canvas.width-nx,nw);nh=Math.min(canvas.height-ny,nh);
      const test={x:nx,y:ny,w:nw,h:nh};
      if(!conflictsWithOthers(test,a.id)){Object.assign(a,test);}
      render()
    }
  }else{
    if(selectedAreaId){
      const sel=m.areas.find(a=>a.id===selectedAreaId);
      if(sel){
        const hn=hitHandle(p,sel);
        if(hn){
          const cursors={nw:'nwse-resize',se:'nwse-resize',ne:'nesw-resize',sw:'nesw-resize',n:'ns-resize',s:'ns-resize',e:'ew-resize',w:'ew-resize'};
          canvas.style.cursor=cursors[hn];return
        }
      }
    }
    canvas.style.cursor=hitArea(p)?'move':'crosshair'
  }
});
function finalizeMouseUp(){
  const m=currentMenu();
  if(mode==='drawing'&&drawStart&&drawCurrent){
    const r=normRect(drawStart,drawCurrent);
    if(r.w>=20&&r.h>=20){
      const newArea={
        id:uid('a'),
        label:'エリア'+(m.areas.length+1),
        x:Math.round(r.x),y:Math.round(r.y),w:Math.round(r.w),h:Math.round(r.h),
        color:COLORS[m.areas.length%COLORS.length],
        action:{type:'',value:''}
      };
      m.areas.push(newArea);
      selectedAreaId=newArea.id;
      expandedAreaIds.add(newArea.id);
      markModified();saveHistory();renderAreaList()
    }
  }else if(mode==='dragging'||mode==='resizing'){
    if(dragOriginal)saveHistory();
    renderAreaList()
  }
  mode='idle';
  drawStart=drawCurrent=dragOffset=resizeHandle=dragOriginal=dragMoveState=null;
  render()
}

function saveHistory(){

  history=history.slice(0,historyIndex+1);
  history.push(snap);
  if(history.length>50)history.shift();

}
function restoreFrom(snap){
  const data=JSON.parse(snap);
  menus.length=0;
  data.forEach(d=>{
    const m={...d,bgImage:null};
    menus.push(m);

function buildAction(act){
  if(!act.type)return{type:'postback',data:'noop'};
  if(act.type==='uri')return{type:'uri',uri:act.value};
  if(act.type==='message')return{type:'message',text:act.value};
  if(act.type==='postback')return{type:'postback',data:act.value};
  if(act.type==='richmenuswitch')return{type:'richmenuswitch',richMenuAliasId:act.value,data:'switch='+act.value};
  return{type:'postback',data:'noop'}
}
function buildRichMenuJson(m){
  const{w,h}=m.size==='compact'?{w:2500,h:843}:{w:2500,h:1686};
  return{
    size:{width:w,height:h},
    selected:m.selected!==false,
    name:m.name,
    chatBarText:m.chatBarText||'メニュー',
    areas:m.areas.map(a=>({bounds:{x:a.x,y:a.y,width:a.w,height:a.h},action:buildAction(a.action)}))
  }
}


function dataUrlByteLength(dataUrl){
  const base64=String(dataUrl).split(',')[1]||'';
  return Math.floor(base64.length*3/4);
}
function formatBytes(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1024*1024)return Math.round(bytes/1024)+' KB';
  return (bytes/1024/1024).toFixed(2)+' MB';
}
function setApiResult(html,type=''){
  const box=$('apiResult');
  if(box){
    box.style.display='block';
    box.innerHTML=html;
    box.style.borderLeftColor=type==='error'?'#dc3545':'#06c755';
  }
  const plain=String(html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  if(plain)setHeaderStatus(plain,type==='error'?'error':'');
}
function makeUploadImageDataUrl(m){
  const{w,h}=getCanvasSize();
  const out=document.createElement('canvas');
  out.width=w;out.height=h;
  const o=out.getContext('2d');
  o.fillStyle=m.bgColor||'#ffffff';
  o.fillRect(0,0,w,h);
  if(m.bgImage){
    try{o.drawImage(m.bgImage,0,0,w,h)}catch(e){}
  }
  let quality=0.92;
  let dataUrl=out.toDataURL('image/jpeg',quality);
  while(dataUrlByteLength(dataUrl)>950*1024 && quality>0.45){
    quality=Math.max(0.45,quality-0.08);
    dataUrl=out.toDataURL('image/jpeg',quality);
  }
  return{dataUrl,bytes:dataUrlByteLength(dataUrl),quality};
}

    sessionStorage.removeItem(LINE_TOKEN_SESSION_KEY);

async function appApi(path,payload){
  const headers={'Content-Type':'application/json'};
  const lineToken=getLineToken();
  if(lineToken)headers['x-line-token']=lineToken;
  const res=await fetch('/api/'+path,{method:'POST',headers,body:JSON.stringify(payload||{})});
  let data={};
  const text=await res.text();
  try{data=text?JSON.parse(text):{};}catch(_){data={ok:false,error:text||'APIの応答を読み取れませんでした。'};}
  if(!res.ok||!data.ok)throw new Error(data.error||('APIエラー: '+res.status));
  return data;
}
function requireLineTokenInput(){
  const token=getLineToken();
  if(!token && !confirm('画面にチャネルアクセストークンが未入力です。Vercel環境変数 LINE_CHANNEL_ACCESS_TOKEN を使用して続行しますか？')){
    throw new Error('チャネルアクセストークンを入力してください。');

  if(token && $('rememberLineToken') && $('rememberLineToken').checked){saveLineTokenFromInput();}
  return token;
}

function isQuotaExceededError(e){
  return !!e && (
    e.name==='QuotaExceededError' ||
    e.name==='NS_ERROR_DOM_QUOTA_REACHED' ||
    e.code===22 ||
    e.code===1014 ||
    String(e.message||'').toLowerCase().includes('quota') ||
    String(e.message||'').includes('容量')
  );
}
function readLocalProjectRaw(){
  const raw=localStorage.getItem(LOCAL_PROJECT_KEY);
  if(!raw)return null;
  try{
    const pointer=JSON.parse(raw);
    if(pointer&&pointer.app==='richmenu-plus-autosave-pointer'&&pointer.key){
      return localStorage.getItem(pointer.key)||null;
    }
  }catch(e){}
  return raw;
}
function writeLocalProjectPointer(key,name,savedAt,saveMode){
  const pointer={
    app:'richmenu-plus-autosave-pointer',
    version:'1.0',
    key,
    name:name||'未設定クライアント',
    savedAt:savedAt||new Date().toISOString(),
    saveMode:saveMode||'full'
  };
  localStorage.setItem(LOCAL_PROJECT_KEY,JSON.stringify(pointer));
}
function pruneOldClientAutosaves(excludeKey,limit=8){
  const list=readClientProjectIndex();
  let removed=0;
  for(let i=list.length-1;i>=0;i--){
    const item=list[i];
    if(!item||!item.key||item.key===excludeKey)continue;
    try{localStorage.removeItem(item.key);removed++;}catch(e){}
    list.splice(i,1);
    if(removed>=limit)break;
  }
  try{localStorage.setItem(LOCAL_PROJECT_CLIENT_INDEX_KEY,JSON.stringify(list));}catch(e){}
  return removed;
}
function writeClientAutosaveWithCleanup(key,json){
  try{
    localStorage.setItem(key,json);
    return {ok:true,cleaned:false};
  }catch(e){
    if(!isQuotaExceededError(e))throw e;
    try{localStorage.removeItem(LOCAL_PROJECT_KEY);}catch(_){}
    pruneOldClientAutosaves(key,12);
    try{
      localStorage.setItem(key,json);
      return {ok:true,cleaned:true};
    }catch(e2){
      if(!isQuotaExceededError(e2))throw e2;
      throw e2;
    }
  }
}
function makeProjectStoragePayload(includeImages=true){

function projectData(options={}){
  const includeImages=options.includeImages!==false;
  const saveKind=options.saveKind||'browser';
  const externalImages=!!options.externalImages;
  const token=getLineToken();
  const cloudAppsScriptUrl=(document.getElementById('cloudSaveEndpointInput')&&document.getElementById('cloudSaveEndpointInput').value.trim())||(localStorage.getItem('richmenu_plus_cloud_apps_script_url_v1')||'');
  const projectName=($('projectFileName')&&$('projectFileName').value.trim())||(currentMenu()?.name)||'リッチメニュー';
  const clientProjectName=currentClientProjectName();
  const baseName=safeFileName(projectName);
  const externalImageList=[];
  const exportedMenus=menus.map((m,index)=>{
    const copy={...m};
    delete copy.bgImage;
    const hasImage=!!m.bgImageData;
    if(externalImages){
      const imageFileName=hasImage?`${baseName}_${String(index+1).padStart(2,'0')}_${safeFileName(m.name||m.alias||('menu'+(index+1)))}.png`:'';
      copy.bgImageData=null;
      copy.browserSaveImageOmitted=hasImage;
      copy.externalImageRequired=hasImage;
      copy.externalImageFileName=imageFileName;
      if(hasImage){
        externalImageList.push({menuId:m.id,menuName:m.name||'',menuAlias:m.alias||'',menuIndex:index,fileName:imageFileName,width:(m.size==='compact'?2500:2500),height:(m.size==='compact'?843:1686)});
      }
    }else if(!includeImages){
      copy.bgImageData=null;
      copy.browserSaveImageOmitted=hasImage;
      copy.externalImageRequired=false;
      copy.externalImageFileName='';
    }else{
      copy.bgImageData=m.bgImageData||null;
      copy.browserSaveImageOmitted=false;
      copy.externalImageRequired=false;
      copy.externalImageFileName='';
    }
    return copy;
  });
  const imageCount=externalImages?externalImageList.length:exportedMenus.filter(m=>!!m.bgImageData).length;
  return {
    app:'richmenu-plus',
    version:'3.2-cloud-v5.1',
    exportType:saveKind==='backup'?'project-backup':'project',
    backupSaveMode:saveKind==='backup'?(externalImages?'json-plus-png':'full-with-images'):'',
    browserSaveMode:includeImages?'full':'compact-no-images',
    autoSaveEnabled:isProjectAutoSaveEnabled(),
    imageDataIncluded:includeImages&&!externalImages,
    externalImagesIncluded:externalImages,
    externalImages:externalImageList,
    backgroundImageCount:imageCount,
    tokenIncluded:!!token,
    savedAt:new Date().toISOString(),
    projectName,
    clientProjectName,
    clientProjectStorageKey:clientProjectStorageKey(),
    appMode,
    currentClientId,
    channelAccessToken:token,
    cloudAppsScriptUrl,
    clients:getSavedClients(),
    currentMenuId,
    menus:exportedMenus
  };
}

function loadProjectData(data){

function updateSaveStatus(msg,type=''){
  if(!msg)return;
  if(String(msg).includes('自動保存')||String(msg).includes('保存先：'))return;
  updateProjectSaveStatus(msg,type==='error'?'error':(type||''));
  setHeaderStatus(msg,type==='error'?'error':'');
}
function saveProjectToLocal(show=false){
  if(restoringProject||!menus.length)return;
  if(!show && !isProjectAutoSaveEnabled()){
    updateProjectSaveStatus('変更あり（自動保存OFF）｜保存先：'+currentClientProjectName(),'dirty');
    return;
  }
  const clientKey=clientProjectStorageKey();
  const clientName=currentClientProjectName();
  let data=null;
  let saveMode='full';
  try{
    // 以前の版では「最後の保存」と「クライアント別保存」に同じ大きいJSONを二重保存していました。
    // 画像入りデータは大きくなりやすいので、最後の保存はポインターだけにして容量を節約します。
    try{localStorage.removeItem(LOCAL_PROJECT_KEY);}catch(_){}

    let payload=makeProjectStoragePayload(true);
    data=payload.data;
    try{
      writeClientAutosaveWithCleanup(clientKey,payload.json);
      saveMode='full';
    }catch(e){
      if(!isQuotaExceededError(e))throw e;
      // それでも容量が足りない場合は、作業内容だけを守るため画像データを外した軽量保存に切り替えます。
      payload=makeProjectStoragePayload(false);
      data=payload.data;
      writeClientAutosaveWithCleanup(clientKey,payload.json);
      saveMode='compact-no-images';
    }
    writeLocalProjectPointer(clientKey,clientName,data.savedAt,saveMode);
    updateClientProjectIndex(clientKey,clientName,data.savedAt);
    const fileNote=hasProjectFileUnsavedChanges?'｜ファイル未保存':'';
    if(saveMode==='compact-no-images'){
      updateProjectSaveStatus('容量が大きいため画像なしでブラウザ保存済み '+formatSaveTime(data.savedAt)+'｜保存先：'+clientName+fileNote,'saved');
      if(show)showToast('容量が大きいため、画像なしでブラウザ保存しました。画像も残す場合はバックアップ保存を使ってください。','error');
    }else{
      updateProjectSaveStatus('ブラウザ保存済み '+formatSaveTime(data.savedAt)+'｜保存先：'+clientName+fileNote,'saved');
      if(show)showToast('このブラウザに保存しました','success');
    }
  }catch(e){
    const msg=isQuotaExceededError(e)
      ? 'ブラウザ保存失敗：ブラウザ保存容量が足りません。バックアップ保存を使ってください。'
      : 'ブラウザ保存失敗：'+e.message;
    updateProjectSaveStatus(msg,'error');
    if(show)showToast(msg,'error');
  }
}

    return;

  // 常時の自動保存は行わず、クライアント変更時とページ離脱時に保存確認を出す方式に統一します。

}

function renameClientProjectStorage(item){
  if(!item||!item.key)return;
  const oldName=item.name||'未設定クライアント';
  const nextName=prompt('クライアント名を変更してください。',oldName);
  if(nextName===null)return;
  const newName=String(nextName).trim();
  if(!newName){showToast('クライアント名を入力してください','error');return;}
  const newKey=clientProjectKeyFromName(newName);
  if(newKey!==item.key && localStorage.getItem(newKey)){
    showToast('同じ名前の保存データがあります','error');
    return;
  }
  const data=readClientProjectData(item);
  if(!data){showToast('保存データが見つかりません','error');renderProjectClientListMenu();return;}
  data.clientProjectName=newName;
  if(data.projectName && oldName && String(data.projectName).includes(oldName))data.projectName=String(data.projectName).replace(oldName,newName);
  data.savedAt=new Date().toISOString();
  try{
    localStorage.setItem(newKey,JSON.stringify(data));
    if(newKey!==item.key)localStorage.removeItem(item.key);
    const list=readClientProjectIndex().map(x=>{
      if(x&&x.key===item.key)return {key:newKey,name:newName,savedAt:data.savedAt};
      return x;
    });
    localStorage.setItem(LOCAL_PROJECT_CLIENT_INDEX_KEY,JSON.stringify(list));
    const clients=getSavedClients().map(c=>{
      if(c&&(c.name===oldName || (data.currentClientId&&c.id===data.currentClientId)))return {...c,name:newName};
      return c;
    });
    setSavedClients(clients);
    const clientInput=$('clientProjectNameInput');
    if(clientInput&&clientInput.value.trim()===oldName)clientInput.value=newName;
    const tokenName=$('clientNameInput');
    if(tokenName&&tokenName.value.trim()===oldName)tokenName.value=newName;
    renderClientSelect();
    renderProjectClientListMenu();
    showToast('クライアント名を変更しました','success');
  }catch(e){showToast('名前変更に失敗しました: '+e.message,'error');}
}

function confirmClientBrowserDelete(name){
  return new Promise(resolve=>{
    let modal=document.getElementById('clientBrowserDeleteConfirm');
    if(!modal){
      modal=document.createElement('div');
      modal.id='clientBrowserDeleteConfirm';
      modal.className='client-delete-confirm-backdrop';
      modal.innerHTML='<div class="client-delete-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="clientDeleteConfirmTitle">'+
        '<div class="client-delete-confirm-head"><strong id="clientDeleteConfirmTitle">ブラウザ保存を削除しますか？</strong></div>'+
        '<div class="client-delete-confirm-body">'+
          '<p class="client-delete-confirm-message" id="clientDeleteConfirmMessage"></p>'+
          '<div class="client-delete-confirm-note">削除されるのは、このブラウザ内に保存されているクライアント管理データです。クラウド保存、Google Drive、LINE公式側に反映済みのリッチメニューは削除されません。</div>'+
          '<div class="client-delete-confirm-actions">'+
            '<button type="button" class="btn btn-danger" id="clientDeleteYesBtn">はい、削除する</button>'+
            '<button type="button" class="btn" id="clientDeleteNoBtn">いいえ</button>'+
          '</div>'+
        '</div>'+
      '</div>';
      document.body.appendChild(modal);
    }
    const msg=document.getElementById('clientDeleteConfirmMessage');
    if(msg)msg.textContent='「'+(name||'未設定クライアント')+'」のブラウザ保存データを削除してもよろしいですか？';
    const yes=document.getElementById('clientDeleteYesBtn');
    const no=document.getElementById('clientDeleteNoBtn');
    function close(value){
      modal.classList.remove('open');
      if(yes)yes.removeEventListener('click',onYes);
      if(no)no.removeEventListener('click',onNo);
      modal.removeEventListener('click',onBackdrop);
      document.removeEventListener('keydown',onKey);
      resolve(value);
    }
    function onYes(){close(true)}
    function onNo(){close(false)}
    function onBackdrop(e){if(e.target===modal)close(false)}
    function onKey(e){if(e.key==='Escape')close(false)}
    if(yes)yes.addEventListener('click',onYes);
    if(no)no.addEventListener('click',onNo);
    modal.addEventListener('click',onBackdrop);
    document.addEventListener('keydown',onKey);
    modal.classList.add('open');
    setTimeout(()=>{if(no)no.focus();},30);
  });
}

async function deleteClientProjectStorage(item){

function askClientNameAndSaveBeforeSwitch(targetKey){
  const entered=prompt('クライアント名が未入力です。\n現在の内容を保存する場合は、保存先のクライアント名を入力してください。','');
  if(entered===null)return false;
  const clean=String(entered||'').trim();
  if(!clean){showToast('クライアント名を入力してください','error');return false;}
  setCurrentClientProjectNameForSave(clean);
  const nextKey=clientProjectStorageKey();
  if(targetKey && nextKey===targetKey){
    const overwrite=confirm('入力したクライアント名は、これから開こうとしている保存データと同じです。\n\nこのまま保存すると、開きたい保存データを現在の内容で上書きする可能性があります。\n\nOK：現在の内容で上書き保存してから開く\nキャンセル：保存せずに開く確認へ進む');
    if(!overwrite)return confirm('保存せずに選択したクライアントを開きますか？');
  }
  saveProjectToLocal(true);
  return true;
}
function confirmBeforeClientProjectSwitch(targetName,targetKey){
  clearTimeout(autoSaveTimer);
  if(!currentProjectHasEditableContent())return true;
  const currentKey=clientProjectStorageKey();
  const currentName=($('clientProjectNameInput')&&$('clientProjectNameInput').value.trim())||'';
  const targetLabel=targetName||'選択したクライアント';
  if(targetKey&&currentKey===targetKey){
    return confirm('「'+targetLabel+'」は現在表示中の保存先と同じです。\n\n保存済みデータを読み込み直すと、現在画面上の変更内容は置き換わる場合があります。\n\n開きますか？');
  }
  if(!currentName){
    const saveBlank=confirm('現在のクライアント名が未入力です。\n\nこの内容を保存してから「'+targetLabel+'」を開きますか？\n\nOK：クライアント名を入力して保存\nキャンセル：保存せずに切り替える確認へ進む');
    if(saveBlank)return askClientNameAndSaveBeforeSwitch(targetKey);
    return confirm('保存せずに「'+targetLabel+'」を開きますか？\n現在表示されている内容は、クライアント一覧に残らない場合があります。');
  }
  if(hasProjectFileUnsavedChanges||isProjectAutoSaveEnabled()){
    const saveNow=confirm('「'+targetLabel+'」を開く前に、現在表示されている内容をお手軽保存しますか？\n\nOK：保存してから開く\nキャンセル：保存せずに切り替える確認へ進む');
    if(saveNow){saveProjectToLocal(true);return true;}
    return confirm('保存せずに「'+targetLabel+'」を開きますか？\n現在の表示内容が別クライアントに上書き保存されないよう、自動保存待ちの処理は止めてから切り替えます。');
  }
  return true;
}
function loadClientProjectFromStorage(key){
  if(!key){showToast('開く保存データが見つかりません','error');return false;}
  let raw='';
  let data=null;
  try{
    raw=localStorage.getItem(key)||'';
    if(!raw){showToast('保存データが見つかりません','error');renderProjectClientListMenu();return false;}
    data=JSON.parse(raw);
    if(!data||data.app!=='richmenu-plus'||!Array.isArray(data.menus)||!data.menus.length)throw new Error('保存データの形式が正しくありません。');
  }catch(e){showToast('保存データを開けません: '+(e&&e.message?e.message:e),'error');return false;}
  const targetName=data.clientProjectName||readClientProjectIndex().find(item=>item&&item.key===key)?.name||'選択したクライアント';
  if(!confirmBeforeClientProjectSwitch(targetName,key))return false;
  try{
    clearTimeout(autoSaveTimer);
    loadProjectData(data);

    // 読み込み後に管理カードとトークン欄を、開いた保存データの内容へ再同期する。
    // loadProjectData 側の汎用復元処理を使いつつ、保存管理（クライアント別）の「開く」で必要な項目だけを確実に反映する。
    if($('clientProjectNameInput'))$('clientProjectNameInput').value=targetName;
    if($('clientNameInput'))$('clientNameInput').value=targetName;
    if(data.projectName&&$('projectFileName'))$('projectFileName').value=data.projectName;
    if(data.channelAccessToken&&$('lineTokenInput'))$('lineTokenInput').value=data.channelAccessToken;
    if(data.currentClientId)currentClientId=data.currentClientId;
    else if(typeof createOrSelectClientForNewProject==='function'){
      const client=createOrSelectClientForNewProject(targetName);
      if(client&&client.id)currentClientId=client.id;
    }
    if(typeof renderClientSelect==='function')renderClientSelect();

    renderMenuTabs();
    loadCurrentMenu();
    renderAreaList();
    renderUserList();
    updateUploadBadge();
    render();
    setTimeout(fitZoom,100);

    const savedAt=data.savedAt||new Date().toISOString();
    writeLocalProjectPointer(key,targetName,savedAt,data.browserSaveMode||'full');
    updateClientProjectIndex(key,targetName,savedAt);
    hasProjectFileUnsavedChanges=false;
    markProjectFileSaved();
    updateProjectSaveStatus('クライアントを開きました｜保存先：'+targetName,'saved');
    closeProjectClientMenu();
    showToast('「'+targetName+'」を開きました','success');
    return true;
  }catch(e){
    restoringProject=false;
    showToast('クライアントを開けません: '+(e&&e.message?e.message:e),'error');
    return false;
  }
}

function triggerDownload(blobOrUrl,fileName,revokeDelay=1200){
  const a=document.createElement('a');
  if(blobOrUrl instanceof Blob)a.href=URL.createObjectURL(blobOrUrl);
  else a.href=blobOrUrl;
  a.download=fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  if(blobOrUrl instanceof Blob)setTimeout(()=>URL.revokeObjectURL(a.href),revokeDelay);
}
function dataUrlToImage(dataUrl){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('画像をPNGに変換できませんでした'));
    img.src=dataUrl;
  });
}
function canvasToPngBlob(canvas){
  return new Promise((resolve,reject)=>{
    canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('PNG保存に失敗しました')),'image/png');
  });
}
async function makeMenuPngBlob(menu){
  const size=menu.size==='compact'?{w:2500,h:843}:{w:2500,h:1686};
  const c=document.createElement('canvas');
  c.width=size.w;c.height=size.h;
  const cctx=c.getContext('2d');
  cctx.fillStyle=menu.bgColor||'#ffffff';
  cctx.fillRect(0,0,size.w,size.h);
  if(menu.bgImageData){
    const img=await dataUrlToImage(menu.bgImageData);
    cctx.drawImage(img,0,0,size.w,size.h);
  }
  return canvasToPngBlob(c);
}
function wait(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
async function downloadProjectImageFiles(data){
  const imageList=projectImageFileList(data);
  if(!imageList.length)return 0;
  let count=0;
  for(const info of imageList){
    const menu=menus.find(m=>m.id===info.menuId)||menus[info.menuIndex];
    if(!menu||!menu.bgImageData)continue;
    const blob=await makeMenuPngBlob(menu);
    triggerDownload(blob,info.fileName||('richmenu-image-'+(count+1)+'.png'),2000);
    count++;
    await wait(180);
  }
  return count;
}

let pendingExternalProjectData=null;
function ensureProjectImageFileInput(){
  let input=$('projectImageFileInput');
  if(input)return input;
  input=document.createElement('input');
  input.type='file';
  input.id='projectImageFileInput';
  input.accept='image/png,image/jpeg,image/*';
  input.multiple=true;
  input.style.display='none';
  document.body.appendChild(input);
  input.addEventListener('change',async e=>{
    const files=Array.from(e.target.files||[]);
    e.target.value='';
    if(!pendingExternalProjectData)return;
    try{
      if(!files.length){showToast('画像ファイルが選択されていません','error');return;}
      await attachExternalImagesToProjectData(pendingExternalProjectData,files);
      finalizeReadProjectData(pendingExternalProjectData,'（JSON＋画像反映）');
    }catch(err){
      showToast('画像読み込み失敗: '+err.message,'error');
    }finally{
      pendingExternalProjectData=null;
    }
  });
  return input;
}
function readFileAsDataUrl(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error(file.name+' を読み込めませんでした'));
    reader.readAsDataURL(file);
  });
}
async function attachExternalImagesToProjectData(data,files){
  const byName=new Map(files.map(f=>[f.name,f]));
  const imageList=projectImageFileList(data);
  const missing=[];
  for(const info of imageList){
    const menu=data.menus.find(m=>m.id===info.menuId)||data.menus[info.menuIndex];
    if(!menu)continue;
    const file=byName.get(info.fileName)||null;
    if(!file){missing.push(info.fileName||menu.name||'画像');continue;}
    menu.bgImageData=await readFileAsDataUrl(file);
    menu.browserSaveImageOmitted=false;
    menu.externalImageLoaded=true;
  }
  if(missing.length){
    if(files.length===imageList.length){
      for(let i=0;i<imageList.length;i++){
        const info=imageList[i];
        const menu=data.menus.find(m=>m.id===info.menuId)||data.menus[info.menuIndex];
        if(menu&&!menu.bgImageData&&files[i]){
          menu.bgImageData=await readFileAsDataUrl(files[i]);
          menu.browserSaveImageOmitted=false;
          menu.externalImageLoaded=true;
        }
      }
    }else{
      throw new Error('必要な画像ファイルが見つかりません：'+missing.slice(0,3).join('、')+(missing.length>3?' ほか':'') );
    }
  }
  return data;
}
function finalizeReadProjectData(data,note){
  const imageCount=countEmbeddedProjectImages(data);
  loadProjectData(data);
  if(data.projectName&&$('projectFileName'))$('projectFileName').value=data.projectName;
  saveProjectToLocal(false);
  markProjectFileSaved();
  updateProjectSaveStatus('JSON読み込み済み'+(note||((imageCount?'（画像反映あり）':'（画像なし）')))+' '+formatSaveTime(new Date())+'｜保存先：'+currentClientProjectName(),'saved');
  showToast('JSONファイルを読み込みました'+(note||((imageCount?'（画像も反映）':'（画像なし）'))),'success');
}
function readProjectFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!confirm('現在の編集中データを、読み込んだプロジェクトで置き換えますか？'))return;
      if(needsExternalProjectImages(data)){
        pendingExternalProjectData=data;
        const list=projectImageFileList(data).map(x=>x.fileName).filter(Boolean);
        showToast('続けてPNG画像ファイルを選択してください','success');
        const input=ensureProjectImageFileInput();
        input.title='必要な画像：'+list.join(', ');
        input.click();
        return;
      }
      finalizeReadProjectData(data);
    }catch(e){showToast('読み込み失敗: '+e.message,'error')}
  };
  reader.onerror=()=>showToast('ファイルを読み込めませんでした','error');
  reader.readAsText(file);
}

function setupAreaAddButton(){
  const areaBlock=document.querySelector('.area-main-block');
  const panel=$('panel-areas');
  if(!areaBlock||!panel||document.getElementById('btnAddAreaFromPanel'))return;
  let title=areaBlock.querySelector(':scope > h3') || areaBlock.querySelector('h3');
  const head=document.createElement('div');
  head.className='area-main-head';
  if(title){

  }else{
    title=document.createElement('h3');
    title.textContent='エリア設定';
  }
  const btn=document.createElement('button');
  btn.type='button';
  btn.id='btnAddAreaFromPanel';
  btn.className='btn btn-add-area';
  btn.textContent='＋ エリア追加';
  btn.title='空いている位置にエリアを追加します';
  head.appendChild(title);
  head.appendChild(btn);
  areaBlock.insertBefore(head,panel);
  btn.addEventListener('click',addAreaFromPanelButton);
}
function addAreaFromPanelButton(){
  const m=currentMenu();
  if(!m){showToast('メニューがありません','error');return;}
  const sizes=[
    {w:Math.min(520,Math.round(canvas.width/3)),h:Math.min(320,Math.round(canvas.height/4))},
    {w:420,h:240},
    {w:320,h:200},
    {w:240,h:160},
    {w:120,h:96}
  ];
  let found=null;
  for(const size of sizes){
    const w=Math.max(20,Math.min(size.w,canvas.width));
    const h=Math.max(20,Math.min(size.h,canvas.height));
    const step=Math.max(20,Math.min(80,Math.round(Math.min(w,h)/2)));
    for(let y=0;y<=canvas.height-h;y+=step){
      for(let x=0;x<=canvas.width-w;x+=step){
        const test={x,y,w,h};
        if(!conflictsWithOthers(test,null)){found=test;break;}
      }
      if(found)break;
    }
    if(found)break;
  }
  if(!found){
    showToast('追加できる空きスペースがありません','error');
    return;
  }
  const newArea={
    id:uid('a'),
    label:'エリア'+(m.areas.length+1),
    x:Math.round(found.x),y:Math.round(found.y),w:Math.round(found.w),h:Math.round(found.h),
    color:COLORS[m.areas.length%COLORS.length],
    action:{type:'',value:''}
  };
  m.areas.push(newArea);
  selectedAreaId=newArea.id;
  expandedAreaIds.add(newArea.id);
  markModified();
  saveHistory();
  renderAreaList();
  render();
  scheduleRightCanvasSync();
  showToast('エリアを追加しました','success');
}


function cleanupOptimizationShells(){
  document.querySelectorAll('.top-menu-row,.drawer-backdrop,.reference-default-actions').forEach(el=>el.remove());
  const drawer=document.getElementById('sideDrawer');
  if(drawer && !drawer.querySelector('#drawer-status-section,#panel-users'))drawer.remove();
  document.querySelectorAll('.below-canvas-grid').forEach(el=>{
    if(!el.querySelector('#panel-settings,#panel-areas,#panel-users,#panel-api'))el.remove();
  });
}

setupScreenshotLikeLayout();

setupAreaAddButton();

cleanupOptimizationShells();
scheduleRightCanvasSync();

initProject();
